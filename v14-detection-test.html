<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova v14 — Detection Test</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#1a0533;color:#fff;font-family:'Nunito',sans-serif;display:flex;flex-direction:column}

#flash{position:fixed;inset:0;z-index:5;opacity:0;pointer-events:none;transition:opacity 0.15s}
#flash.open{background:#00cc66;opacity:0.45}
#flash.hit{background:#00ff99;opacity:0.55}
#flash.miss{background:#cc3333;opacity:0.45}

#topbar{padding:8px 14px;background:rgba(0,0,0,0.6);display:flex;justify-content:space-between;align-items:center;z-index:30}
#title{font-family:'Fredoka One',cursive;font-size:15px;color:#ff6fd8}
#status{font-size:11px;opacity:0.7}

#stage{flex:1;display:flex;position:relative;min-height:0}
#cam-wrap{flex:1;position:relative;background:#000}
#cam{width:100%;height:100%;object-fit:contain;transform:scaleX(-1);display:block;background:#000}
#pills{position:absolute;top:10px;left:10px;right:10px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap;z-index:10}
.pill{background:rgba(0,0,0,0.75);padding:5px 10px;border-radius:12px;font-size:11px;font-weight:700;color:#fff;font-family:monospace}
.pill.on{background:#00ff99;color:#000}

#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:20;text-shadow:0 2px 20px rgba(0,0,0,0.85)}
#cue-emoji{font-size:clamp(80px,16vw,140px);line-height:1}
#cue-text{font-family:'Fredoka One',cursive;font-size:clamp(28px,5vw,44px);color:#ffd700;margin-top:10px;text-align:center;padding:0 20px}
#count{font-family:'Fredoka One',cursive;font-size:clamp(120px,20vw,200px);color:#ffd700;line-height:1;min-height:0}
#timerbar{position:absolute;bottom:0;left:0;right:0;height:10px;background:rgba(0,0,0,0.4);z-index:25}
#timerfill{height:100%;width:100%;background:linear-gradient(90deg,#00ff99,#ffd700,#ff6680);transform-origin:left}
@keyframes shrink{from{transform:scaleX(1)}to{transform:scaleX(0)}}

#controls{padding:10px;background:rgba(0,0,0,0.65);display:flex;gap:8px;justify-content:center;flex-wrap:wrap;z-index:30}
button{background:linear-gradient(135deg,#ff6fd8,#7c6fff);border:none;border-radius:22px;padding:9px 16px;color:#fff;font-size:12px;font-weight:700;font-family:'Fredoka One',cursive;cursor:pointer}
button.alt{background:linear-gradient(135deg,#00d2ff,#7c6fff)}
button.copy{background:linear-gradient(135deg,#ffa500,#ff6680)}
button:disabled{opacity:0.4}

#log{position:fixed;bottom:58px;left:6px;right:6px;max-height:24vh;overflow-y:auto;background:rgba(0,0,0,0.88);border-radius:8px;padding:6px;font-family:monospace;font-size:10px;line-height:1.4;z-index:25;display:none}
#log.show{display:block}
.ok{color:#00ff99}.no{color:#ff6680}.late{color:#ffa500}.info{color:#8eccff}.warn{color:#ffd700}

#start-screen{position:fixed;inset:0;background:#1a0533;z-index:80;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:20px;text-align:center}
#start-screen h1{font-family:'Fredoka One',cursive;font-size:26px;color:#ff6fd8}
#start-screen p{font-size:13px;opacity:0.85;max-width:400px;line-height:1.55}
</style>
</head>
<body>

<div id="flash"></div>

<div id="start-screen">
  <h1>🧪 Nova v14 Detection Test</h1>
  <p>Four moves: <b>right arm, left arm, clap, both arms</b>.<br>
  Stand back so your head, shoulders and hands are all visible.</p>
  <p style="font-size:11px;opacity:0.6">Browser English speech. No song.</p>
  <button onclick="startFlow(3000)" style="font-size:16px;padding:14px 28px">▶️ Start Test</button>
</div>

<div id="topbar">
  <div id="title">🧪 Nova v14 Detection Test</div>
  <div id="status">Loading…</div>
</div>

<div id="stage">
  <div id="cam-wrap">
    <video id="cam" autoplay playsinline muted></video>
    <div id="pills">
      <div class="pill" id="p-left">👈 LEFT —</div>
      <div class="pill" id="p-right">👉 RIGHT —</div>
      <div class="pill" id="p-both">🙌 BOTH —</div>
      <div class="pill" id="p-clap">👏 CLAP —</div>
    </div>
    <div id="overlay">
      <div id="cue-emoji"></div>
      <div id="cue-text"></div>
      <div id="count"></div>
    </div>
    <div id="timerbar"><div id="timerfill"></div></div>
    <div id="debug-strip" style="position:absolute;bottom:14px;left:10px;right:10px;text-align:center;font-family:monospace;font-size:11px;color:#fff;background:rgba(0,0,0,0.65);padding:4px;border-radius:6px;z-index:20">waiting...</div>
  </div>
</div>

<div id="controls">
  <button onclick="startFlow(3000)">▶️ Start</button>
  <button onclick="toggleLog()">📋 Log</button>
  <button class="copy" onclick="copyReport()">📎 Copy report</button>
</div>

<div id="log"></div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>

<script>
// ── STATE ──
let detector = null;
let video = null;
let running = false;
let windowOpen = false;
let windowStartTime = 0;
let currentKey = null;

const moves = { left:false, right:false, both:false };
const holdCount = { left:0, right:0, both:0 };
const HOLD = 2;

let clapDetected = false;
let lastClapTime = 0;
let micAnalyser = null;
let micData = null;
let ambientPeakBaseline = 0;
let ambientSamples = [];
let micCalibrated = false;

// ── LOG ──
const sessionLog = {
  events: [],
  log(type, data = {}){
    const entry = { t: Date.now(), type, ...data };
    this.events.push(entry);
    const el = document.getElementById('log');
    const cls = type==='hit'?'ok':type==='miss'?'no':type==='late'?'late':type==='warn'?'warn':'info';
    const line = document.createElement('div');
    line.className = cls;
    const ts = new Date(entry.t).toLocaleTimeString().slice(3);
    line.textContent = `[${ts}] ${type} ${JSON.stringify(data)}`;
    el.insertBefore(line, el.firstChild);
  },
  reset(){ this.events = []; document.getElementById('log').innerHTML = ''; },
  report(){
    const hits = this.events.filter(e => e.type==='hit');
    const misses = this.events.filter(e => e.type==='miss');
    const lates = this.events.filter(e => e.type==='late');
    const claps = this.events.filter(e => e.type==='clap_trigger');
    return {
      summary: { total: hits.length+misses.length+lates.length, hits: hits.length, lates: lates.length, misses: misses.length, clapTriggers: claps.length, ambientPeakBaseline: Math.round(ambientPeakBaseline) },
      hits: hits.map(h => ({ action:h.action, reactionMs:h.reactionMs })),
      lates: lates.map(h => ({ action:h.action, reactionMs:h.reactionMs })),
      misses: misses.map(m => m.action),
      allEvents: this.events
    };
  }
};

window.toggleLog = () => document.getElementById('log').classList.toggle('show');
window.copyReport = async () => {
  const text = JSON.stringify(sessionLog.report(), null, 2);
  try { await navigator.clipboard.writeText(text); setStatus('📎 Report copied — paste to Claude'); }
  catch(e){ console.log(text); setStatus('Copy failed, log printed to console'); }
};

function setStatus(s){ document.getElementById('status').textContent = s; }

// ── BROWSER VOICE ──
let voices = [];
function loadVoices(){
  voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function speak(text, rate=1.0){
  return new Promise(resolve => {
    try {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US';
      u.rate = rate;
      u.pitch = 1.15;
      u.volume = 1.0;
      if(voices.length){
        const preferred = voices.find(v => /Samantha|Karen|Google.*Female|Microsoft Zira/i.test(v.name)) || voices[0];
        u.voice = preferred;
      }
      u.onend = () => resolve();
      u.onerror = () => resolve();
      speechSynthesis.speak(u);
      setTimeout(resolve, text.length * 90 + 1500);
    } catch(e){ resolve(); }
  });
}

// ── CAMERA + POSE ──
// Combined camera + mic permission in ONE request — browser asks for both at once
let combinedStream = null;

async function initMedia(){
  setStatus('Requesting camera + mic permission...');
  try {
    combinedStream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1920 }, height: { ideal: 1080 }, facingMode: 'user' },
      audio: true
    });
  } catch(e) {
    setStatus('❌ Permission denied: ' + e.message);
    sessionLog.log('permission_error', { error: e.message });
    alert('Camera + microphone permission needed.\nPlease allow both and refresh the page.\n\nError: ' + e.message);
    throw e;
  }

  // Use combined stream DIRECTLY on video element — muted so no audio plays out
  video = document.getElementById('cam');
  video.muted = true;
  video.srcObject = combinedStream;
  await new Promise(r => video.onloadedmetadata = r);
  await video.play();
  const vTrack = combinedStream.getVideoTracks()[0];
  const vSettings = vTrack.getSettings();
  sessionLog.log('camera_ready', { width: vSettings.width, height: vSettings.height });

  // Set up mic using the SAME stream — AudioContext can tap it separately
  const audioTracks = combinedStream.getAudioTracks();
  if(audioTracks.length === 0){
    sessionLog.log('mic_fail', { err: 'no audio track in stream' });
    setStatus('⚠️ Camera OK but no microphone');
    return;
  }
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const src = ctx.createMediaStreamSource(combinedStream);
  micAnalyser = ctx.createAnalyser();
  micAnalyser.fftSize = 512;
  src.connect(micAnalyser);
  micData = new Uint8Array(micAnalyser.frequencyBinCount);
  micLoop();
  sessionLog.log('mic_ready', { label: audioTracks[0].label });
  setStatus('✅ Camera + mic ready');
}

async function initDetector(){
  await tf.setBackend('webgl');
  await tf.ready();
  detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING }
  );
}

const smooth = {};
function smoothKp(key, kp){
  if(!smooth[key]) smooth[key] = { x:kp.x, y:kp.y, score:kp.score };
  const a = 0.7;
  smooth[key].x = smooth[key].x * a + kp.x * (1-a);
  smooth[key].y = smooth[key].y * a + kp.y * (1-a);
  smooth[key].score = kp.score;
  return smooth[key];
}

async function poseLoop(){
  if(!detector || !video || video.readyState < 2){ requestAnimationFrame(poseLoop); return; }
  try {
    const poses = await detector.estimatePoses(video, { flipHorizontal:false });
    if(poses.length > 0) analyzePose(poses[0].keypoints);
  } catch(e){}
  requestAnimationFrame(poseLoop);
}

function analyzePose(kps){
  const get = n => kps.find(k => k.name === n);
  const ls = get('left_shoulder'), rs = get('right_shoulder');
  const lw = get('left_wrist'), rw = get('right_wrist');
  if(!ls || !rs || !lw || !rw) {
    window._lastDetect = { err: 'no_keypoints' };
    return;
  }

  const sLs = smoothKp('ls', ls), sRs = smoothKp('rs', rs);
  const sLw = smoothKp('lw', lw), sRw = smoothKp('rw', rw);
  const MIN = 0.3;

  const scale = Math.max(Math.abs(sLs.x - sRs.x), 60);
  const thr = scale * 0.24;

  const lDelta = sLs.y - sLw.y; // positive = left wrist above left shoulder
  const rDelta = sRs.y - sRw.y; // positive = right wrist above right shoulder

  const lUp = sLw.score > MIN && lDelta > thr;
  const rUp = sRw.score > MIN && rDelta > thr;

  // Store raw stats for live debug + hit logs
  window._lastDetect = {
    lScore: sLw.score.toFixed(2),
    rScore: sRw.score.toFixed(2),
    shScore: Math.min(sLs.score, sRs.score).toFixed(2),
    scale: Math.round(scale),
    thr: Math.round(thr),
    lDelta: Math.round(lDelta),
    rDelta: Math.round(rDelta),
    lUp, rUp
  };

  const hold = (raw, key) => {
    holdCount[key] = raw ? Math.min(holdCount[key]+1, 10) : Math.max(holdCount[key]-1, 0);
    return holdCount[key] >= HOLD;
  };

  moves.left  = hold(lUp && !rUp, 'left');
  moves.right = hold(rUp && !lUp, 'right');
  moves.both  = lUp && rUp;

  setPill('p-left', '👈 LEFT', moves.left);
  setPill('p-right', '👉 RIGHT', moves.right);
  setPill('p-both', '🙌 BOTH', moves.both);

  // Update live debug strip
  const dbg = document.getElementById('debug-strip');
  if(dbg){
    dbg.textContent = `L:${Math.round(lDelta)}/${Math.round(thr)} ${lUp?'UP':'--'}  R:${Math.round(rDelta)}/${Math.round(thr)} ${rUp?'UP':'--'}  conf:${Math.min(sLw.score,sRw.score).toFixed(2)}`;
  }
}

function setPill(id, label, on){
  const el = document.getElementById(id);
  if(!el) return;
  const onNow = el.classList.contains('on');
  if(onNow !== on){
    el.classList.toggle('on', on);
    el.textContent = `${label} ${on?'✅':'—'}`;
  }
}

// ── MIC / CLAP ──
async function initMic(){
  // Now handled by initMedia() which requests camera + mic together
}

async function calibrateMic(){
  ambientSamples = [];
  const startT = Date.now();
  while(Date.now() - startT < 1500){
    if(micData){
      micAnalyser.getByteFrequencyData(micData);
      let peak = 0;
      for(let i = 0; i < micData.length; i++) if(micData[i] > peak) peak = micData[i];
      ambientSamples.push(peak);
    }
    await new Promise(r => setTimeout(r, 50));
  }
  ambientSamples.sort((a,b) => a - b);
  ambientPeakBaseline = ambientSamples[Math.floor(ambientSamples.length * 0.95)] || 60;
  micCalibrated = true;
  sessionLog.log('mic_calibrated', { baseline: Math.round(ambientPeakBaseline) });
}

function micLoop(){
  if(!micAnalyser) return;
  requestAnimationFrame(micLoop);
  micAnalyser.getByteFrequencyData(micData);
  let peak = 0, sum = 0;
  for(let i = 0; i < micData.length; i++){
    sum += micData[i];
    if(micData[i] > peak) peak = micData[i];
  }
  const now = Date.now();
  const threshold = Math.max(ambientPeakBaseline + 30, 130);
  const canTrigger = micCalibrated && peak > threshold && now - lastClapTime > 400;

  if(canTrigger){
    lastClapTime = now;
    clapDetected = true;
    if(running){
      sessionLog.log('clap_trigger', { peak, threshold: Math.round(threshold) });
    }
    setPill('p-clap', '👏 CLAP', true);
    setTimeout(() => { clapDetected = false; setPill('p-clap', '👏 CLAP', false); }, 350);
  } else if(!clapDetected){
    if(!micLoop.tick) micLoop.tick = 0;
    micLoop.tick++;
    if(micLoop.tick % 6 === 0){
      const el = document.getElementById('p-clap');
      if(el) el.textContent = `👏 CLAP ${peak}/${Math.round(threshold)}`;
    }
  }
}

// ── FLOW ──
const ACTIONS = [
  { key:'right', name:'RIGHT arm',  emoji:'👉', check: () => moves.right },
  { key:'left',  name:'LEFT arm',   emoji:'👈', check: () => moves.left  },
  { key:'clap',  name:'clap',       emoji:'👏', check: () => clapDetected },
  { key:'both',  name:'BOTH arms',  emoji:'🙌', check: () => moves.both  },
];

function setCue(emoji, text){
  document.getElementById('cue-emoji').textContent = emoji || '';
  document.getElementById('cue-text').textContent  = text  || '';
}
function setCount(n){ document.getElementById('count').textContent = n || ''; }
function setFlash(state){
  const f = document.getElementById('flash');
  f.className = state || '';
}
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function runAction(action, windowMs){
  sessionLog.log('announce', { action: action.key });
  setCue(action.emoji, `Get ready: ${action.name}`);
  await speak(`Get ready. Raise your ${action.name}.`);

  for(let n = 3; n >= 1; n--){
    setCount(n);
    speak(String(n));
    await sleep(700);
  }
  setCount('');
  setCue('', '');
  await sleep(100); // tiny settle so countdown text clears before GO

  // === OPEN: green flash ON at exact same moment timer starts ===
  const tf = document.getElementById('timerfill');
  const flash = document.getElementById('flash');

  // Prepare timer bar but don't animate yet
  tf.style.animation = 'none';
  tf.style.transform = 'scaleX(1)';
  void tf.offsetWidth;

  // Atomic start: set green + start timer + record time in same frame
  setCue(action.emoji, `GO! ${action.name}`);
  flash.className = 'open';
  tf.style.animation = `shrink ${windowMs}ms linear forwards`;
  const startT = performance.now();
  windowOpen = true;
  windowStartTime = Date.now();
  currentKey = action.key;
  sessionLog.log('open', { action: action.key, windowMs, startT: Math.round(startT) });
  speak('Now!');

  // Poll for detection until EXACTLY windowMs elapses
  let reactionMs = null;
  const poll = 30;
  while(true){
    const elapsed = performance.now() - startT;
    if(elapsed >= windowMs) break;
    if(action.check()){
      reactionMs = Math.round(elapsed);
      break;
    }
    await sleep(poll);
  }

  // === CLOSE: green flash OFF at exact window end ===
  const actualDuration = Math.round(performance.now() - startT);
  flash.className = '';  // green OFF immediately
  tf.style.animation = 'none';
  tf.style.transform = 'scaleX(0)';
  windowOpen = false;
  sessionLog.log('close', { action: action.key, actualDurationMs: actualDuration, finalPose: window._lastDetect });

  // === RESULT flash (separate from green window) ===
  await sleep(50);
  if(reactionMs !== null){
    const isLate = reactionMs > windowMs * 0.7;
    flash.className = 'hit';
    setCue('✅', `${action.name} — ${reactionMs}ms${isLate?' (late)':''}`);
    sessionLog.log(isLate ? 'late' : 'hit', { action: action.key, reactionMs });
  } else {
    flash.className = 'miss';
    setCue('❌', `Missed: ${action.name}`);
    sessionLog.log('miss', { action: action.key });
  }
  await sleep(1200);
  flash.className = '';
  setCue('', '');
}

window.startFlow = async function(windowMs){
  if(running) return;
  running = true;
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('log').classList.add('show');
  sessionLog.reset();
  sessionLog.log('flow_start', { windowMs });

  setStatus(`Running ${windowMs/1000}s flow…`);

  if(!micCalibrated){
    setCue('🎤', 'Calibrating mic — stay quiet');
    await calibrateMic();
    await sleep(400);
    setCue('', '');
  }

  await speak(`Let's test four moves. The green flash means go.`);
  await sleep(300);

  for(const action of ACTIONS){
    await runAction(action, windowMs);
    await sleep(500);
  }

  setCue('🎉', 'Done!');
  const r = sessionLog.report();
  sessionLog.log('flow_end', r.summary);
  await speak(`Done. ${r.summary.hits} good. ${r.summary.lates} late. ${r.summary.misses} missed.`);
  setStatus(`Done — ${r.summary.hits} hits / ${r.summary.lates} late / ${r.summary.misses} missed. Press Copy Report.`);
  running = false;
};

// ── BOOT ──
(async function(){
  try {
    await initMedia();  // requests camera + mic permission in ONE prompt
    setStatus('Loading pose model…');
    await initDetector();
    poseLoop();
    setStatus('✅ Ready — pick a flow');
  } catch(e){
    setStatus('❌ ' + e.message);
    console.error(e);
  }
})();
</script>

</body>
</html>
