<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Dance</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#1a0533;color:#fff;font-family:'Nunito',sans-serif;display:flex;flex-direction:column;transition:background 0.15s}
body.window-open{background:#003322}

#topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);z-index:10;flex-shrink:0}
#logo{font-family:'Fredoka One',cursive;font-size:18px;background:linear-gradient(135deg,#ff6fd8,#7c6fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#score-display{font-family:'Fredoka One',cursive;font-size:16px;color:#ffd700}

#split{flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:0;position:relative}

/* NOVA SIDE — D-ID agent fills it */
#nova-side{position:relative;overflow:hidden;background:radial-gradient(ellipse at 50% 30%,#3a0a6a 0%,#1a0340 60%,#0a0120 100%)}
#did-container{position:absolute;inset:0;width:100%;height:100%}
/* Hide D-ID default UI chrome, keep just the avatar */
#did-container iframe{width:100%;height:100%;border:none}
#nova-label{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.5);border:1px solid rgba(255,111,216,0.4);border-radius:20px;padding:3px 14px;font-family:'Fredoka One',cursive;font-size:12px;color:#ff6fd8;white-space:nowrap;z-index:5}

/* CAM SIDE */
#cam-side{position:relative;background:#0a0a1a;overflow:hidden}
#webcam{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
#cam-label{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:3;background:rgba(0,0,0,0.5);border:1px solid rgba(0,210,255,0.4);border-radius:20px;padding:3px 14px;font-family:'Fredoka One',cursive;font-size:12px;color:#00d2ff}
#pills{position:absolute;top:8px;left:8px;z-index:3;display:flex;flex-direction:column;gap:4px}
.pill{background:rgba(0,0,0,0.7);border-radius:8px;padding:3px 8px;font-size:10px;font-weight:700;font-family:monospace}
.pill.on{background:#00ff99;color:#000}

#green-flash{position:fixed;inset:0;background:#00ff88;opacity:0;pointer-events:none;z-index:4;transition:opacity 0.08s}
#green-flash.show{opacity:0.3}

#lyric-box{position:absolute;bottom:52px;left:0;right:0;text-align:center;z-index:5;pointer-events:none}
#lyric-text{font-family:'Fredoka One',cursive;font-size:clamp(18px,3.5vw,28px);color:#fff;text-shadow:0 2px 12px rgba(0,0,0,0.9);opacity:0;transition:opacity 0.25s}
#lyric-text.show{opacity:1}

#action-cue{position:absolute;top:35%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:6;text-align:center;pointer-events:none;transition:transform 0.25s cubic-bezier(.34,1.56,.64,1);background:rgba(0,0,0,0.88);border-radius:24px;padding:14px 22px;border:3px solid rgba(255,111,216,0.6);backdrop-filter:blur(8px);min-width:180px}
#action-cue.show{transform:translate(-50%,-50%) scale(1)}
#action-cue.live{border-color:#00ff99;box-shadow:0 0 40px rgba(0,255,150,0.5)}
#cue-emoji{font-size:clamp(52px,10vw,80px);display:block}
#cue-label{font-family:'Fredoka One',cursive;font-size:clamp(20px,4vw,30px);color:#ff6fd8;display:block;margin-top:4px}
#cue-instr{font-size:clamp(12px,2vw,16px);color:rgba(255,255,255,0.85);font-weight:700;display:block;margin-top:4px}
#cue-timer{height:5px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;margin-top:8px}
#cue-timer-fill{height:100%;width:100%;transform-origin:left;background:#00ff99}
@keyframes timerShrink{from{transform:scaleX(1)}to{transform:scaleX(0)}}

#feedback{position:absolute;inset:0;opacity:0;pointer-events:none;z-index:7;transition:opacity 0.12s}
#feedback.hit{background:rgba(0,255,150,0.2);opacity:1}
#feedback.miss{background:rgba(255,100,0,0.15);opacity:1}
#score-pop{position:absolute;top:28%;left:50%;transform:translateX(-50%) scale(0);font-family:'Fredoka One',cursive;font-size:52px;z-index:8;pointer-events:none;transition:transform 0.2s cubic-bezier(.34,1.56,.64,1);text-shadow:0 0 20px currentColor}
#score-pop.show{transform:translateX(-50%) scale(1)}
#progress-bar{position:absolute;bottom:0;left:0;right:0;height:4px;background:rgba(255,255,255,0.1);z-index:9}
#progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#ff6fd8,#7c6fff,#00d2ff);transition:width 0.1s linear}

/* START SCREEN */
#start-screen{position:fixed;inset:0;z-index:50;background:radial-gradient(ellipse at 50% 30%,#2d0a5a,#1a0533);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:24px;text-align:center}
#start-screen h1{font-family:'Fredoka One',cursive;font-size:clamp(28px,6vw,44px);background:linear-gradient(135deg,#ff6fd8,#7c6fff,#00d2ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.start-btn{background:linear-gradient(135deg,#ff6fd8,#7c6fff);border:none;border-radius:50px;padding:14px 40px;font-family:'Fredoka One',cursive;font-size:22px;color:#fff;cursor:pointer;box-shadow:0 6px 28px rgba(124,111,255,0.5);transition:transform .2s;width:100%;max-width:320px}
.start-btn:hover{transform:scale(1.04)}

/* END SCREEN */
#end-screen{position:fixed;inset:0;z-index:55;background:radial-gradient(ellipse at 50% 30%,#2d0a5a,#1a0533);display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px;text-align:center}
#end-screen h1{font-family:'Fredoka One',cursive;font-size:clamp(28px,6vw,42px);background:linear-gradient(135deg,#ff6fd8,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#end-stars{font-size:48px;letter-spacing:6px}
#end-score{font-family:'Fredoka One',cursive;font-size:28px;color:#ffd700}
#end-detail{font-size:15px;color:rgba(255,255,255,0.7)}
</style>
</head>

<script>
// ═══════════════════════════════════════════

// ═══════════════════════════════════════════
const SONG_DURATION = 92000;

// ═══════════════════════════════════════════
// D-ID Agent messaging
// Send messages to Nova avatar via postMessage
// ═══════════════════════════════════════════
function novaSay(text) {
  // Post message to D-ID agent to make Nova speak
  const agent = document.querySelector('[data-name="did-agent"]');
  if(agent && agent.contentWindow) {
    agent.contentWindow.postMessage({ type: 'speak', text }, '*');
  }
  // Also use browser TTS as fallback
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 0.95; u.pitch = 1.3;
    const voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
    const pref = voices.find(v => /Samantha|Karen|Google.*Female|Zira/i.test(v.name)) || voices[0];
    if(pref) u.voice = pref;
    speechSynthesis.speak(u);
  } catch(e) {}
}

// ═══════════════════════════════════════════

// ═══════════════════════════════════════════
const TIMELINE = [

];

// ═══════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════
let score=0,hits=0,attempts=0,combo=0,maxCombo=0;
let timelineIdx=0,songTimer=null;
let currentAction=null,actionDetected=false,actionWindow=false,actionStartTime=0;

// ═══════════════════════════════════════════
// POSE DETECTION
// ═══════════════════════════════════════════
let detector=null;
const moves={left:false,right:false,both:false};
const holdCount={left:0,right:0,both:0};
const smooth={};

async function initDetector(){
  await tf.setBackend('webgl');
  await tf.ready();
  detector=await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType:poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING}
  );
}

function smoothKp(key,kp){
  if(!smooth[key]) smooth[key]={x:kp.x,y:kp.y,score:kp.score};
  const a=0.7;
  smooth[key].x=smooth[key].x*a+kp.x*(1-a);
  smooth[key].y=smooth[key].y*a+kp.y*(1-a);
  smooth[key].score=kp.score;
  return smooth[key];
}

async function poseLoop(){
  const v=document.getElementById('webcam');
  if(!detector||!v||v.readyState<2){requestAnimationFrame(poseLoop);return;}
  try{
    const p=await detector.estimatePoses(v,{flipHorizontal:false});
    if(p.length>0) analyzePose(p[0].keypoints);
  }catch(e){}
  requestAnimationFrame(poseLoop);
}

function analyzePose(kps){
  const g=n=>kps.find(k=>k.name===n);
  const ls=g('left_shoulder'),rs=g('right_shoulder'),lw=g('left_wrist'),rw=g('right_wrist');
  if(!ls||!rs||!lw||!rw) return;
  const sLs=smoothKp('ls',ls),sRs=smoothKp('rs',rs),sLw=smoothKp('lw',lw),sRw=smoothKp('rw',rw);
  const MIN=0.3,scale=Math.max(Math.abs(sLs.x-sRs.x),60),thr=scale*0.24;
  const lUp=sLw.score>MIN&&(sLs.y-sLw.y)>thr;
  const rUp=sRw.score>MIN&&(sRs.y-sRw.y)>thr;
  const hold=(raw,key)=>{holdCount[key]=raw?Math.min(holdCount[key]+1,10):Math.max(holdCount[key]-1,0);return holdCount[key]>=2;};
  moves.left=hold(lUp&&!rUp,'left');
  moves.right=hold(rUp&&!lUp,'right');
  moves.both=lUp&&rUp;
  const sp=(id,lbl,on)=>{const el=document.getElementById(id);if(!el)return;el.classList.toggle('on',on);el.textContent=lbl+(on?' ON':'--');};
  sp('p-left','L arm ',moves.left);
  sp('p-right','R arm ',moves.right);
  sp('p-both','BOTH ',moves.both);
}

function checkAction(a){return a==='left'?moves.left:a==='right'?moves.right:a==='both'?moves.both:false;}

// ═══════════════════════════════════════════
// UI
// ═══════════════════════════════════════════
function showLyric(t){const el=document.getElementById('lyric-text');el.textContent=t;el.classList.remove('show');void el.offsetWidth;el.classList.add('show');}

function showCue(emoji,label,instr,isLive,ms){
  const c=document.getElementById('action-cue');
  document.getElementById('cue-emoji').textContent=emoji;
  document.getElementById('cue-label').textContent=label;
  document.getElementById('cue-instr').textContent=instr;
  c.classList.add('show');
  if(isLive){
    c.classList.add('live');
    const tf=document.getElementById('cue-timer-fill');
    tf.style.animation='none';void tf.offsetWidth;
    tf.style.animation='timerShrink '+ms+'ms linear forwards';
  } else {
    c.classList.remove('live');
  }
}

function hideCue(){document.getElementById('action-cue').classList.remove('show','live');}
function flashFeedback(t){const f=document.getElementById('feedback');f.className=t;setTimeout(()=>f.className='',600);}
function showScorePop(pts,color){const el=document.getElementById('score-pop');el.textContent='+'+pts;el.style.color=color||'#ffd700';el.classList.remove('show');void el.offsetWidth;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),900);}
function setGreenFlash(on){document.getElementById('green-flash').classList.toggle('show',on);document.body.classList.toggle('window-open',on);}

// ═══════════════════════════════════════════
// SONG LOOP
// ═══════════════════════════════════════════
const HIT_PHRASES = ['Amazing! Yes!','Woohoo! Great job!','You got it! Yay!','Superstar! Keep going!','Perfect! Love it!'];
const MISS_PHRASES = ['Try again! You can do it!','Almost! Keep dancing!','Next time! Woo!'];
let lastSpeak = 0;

function maybeSpeak(phrases){
  const now = Date.now();
  if(now - lastSpeak < 5000) return;
  lastSpeak = now;
  novaSay(phrases[Math.floor(Math.random()*phrases.length)]);
}

function startSong(){
  timelineIdx=0;
  const audio=new Audio('hello.mp3');
  audio.volume=0.85;
  window._songAudio=audio;
  audio.play().catch(()=>{});
  audio.onended=()=>setTimeout(endGame,1000);

  songTimer=setInterval(()=>{
    const elapsed=window._songAudio&&!window._songAudio.paused?window._songAudio.currentTime*1000:0;
    document.getElementById('progress-fill').style.width=Math.min(100,(elapsed/SONG_DURATION)*100)+'%';

    while(timelineIdx<TIMELINE.length&&elapsed>=TIMELINE[timelineIdx].t){
      const e=TIMELINE[timelineIdx];
      if(e.type==='lyric') showLyric(e.text);
      else if(e.type==='helloL'||e.type==='helloR') showLyric(e.lyric||'Hello,');
      else if(e.type==='demo') showCue(e.emoji,e.label,e.instr,false,0);
      else if(e.type==='open'){
        currentAction=e;actionDetected=false;actionWindow=true;
        actionStartTime=Date.now();attempts++;
        let wMs=2500;
        for(let j=timelineIdx+1;j<TIMELINE.length;j++){
          if(TIMELINE[j].type==='close'&&TIMELINE[j].action===e.action){wMs=TIMELINE[j].t-e.t;break;}
        }
        setGreenFlash(true);
        showCue(e.emoji,e.label,e.instr,true,wMs);
        let el2=0;
        const chk=setInterval(()=>{
          el2+=80;
          if(!actionWindow||actionDetected||el2>wMs+200){clearInterval(chk);return;}
          if(checkAction(e.action)){
            actionDetected=true;clearInterval(chk);
            const rm=Date.now()-actionStartTime,isGreat=rm<1000;
            const pts=isGreat?Math.round(e.pts*1.5):e.pts;
            score+=pts;hits++;combo++;maxCombo=Math.max(maxCombo,combo);
            document.getElementById('score-display').textContent=score+' pts';
            flashFeedback('hit');showScorePop(pts,isGreat?'#ffd700':'#00ff99');
            maybeSpeak(HIT_PHRASES);
          }
        },80);
      }
      else if(e.type==='close'){
        setGreenFlash(false);hideCue();
        if(!actionDetected&&actionWindow){combo=0;flashFeedback('miss');maybeSpeak(MISS_PHRASES);}
        actionWindow=false;
      }
      timelineIdx++;
    }
  },80);
}

function endGame(){
  clearInterval(songTimer);setGreenFlash(false);
  if(window._songAudio) window._songAudio.pause();
  const rate=attempts>0?hits/attempts:0;
  const stars=rate>=0.9?5:rate>=0.7?4:rate>=0.5?3:rate>=0.3?2:1;
  document.getElementById('end-title').textContent=['Keep trying!','Good job!','Great!','Amazing!','PERFECT!'][stars-1];
  document.getElementById('end-stars').textContent='&#11088;'.repeat(stars)+'&#9734;'.repeat(5-stars);
  document.getElementById('end-score').textContent=score+' pts';
  document.getElementById('end-detail').textContent=hits+' of '+attempts+' moves. Best combo: '+maxCombo;
  document.getElementById('end-screen').style.display='flex';
  novaSay('Wow! You are an amazing dancer! ' + hits + ' moves! Superstar!');
}

window.restartGame=function(){
  score=0;hits=0;attempts=0;combo=0;maxCombo=0;
  document.getElementById('score-display').textContent='0 pts';
  document.getElementById('progress-fill').style.width='0%';
  document.getElementById('end-screen').style.display='none';
  startSong();
};

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
window.beginGame = async function(){
  document.getElementById('start-screen').style.display='none';

  // Request camera
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{width:{ideal:1280},height:{ideal:720},facingMode:'user'},
      audio:false
    });
    const v=document.getElementById('webcam');
    v.srcObject=stream;
    await new Promise(r=>v.onloadedmetadata=r);
    await v.play();
  }catch(e){alert('Camera needed: '+e.message);return;}

  // Load pose detection
  try{await initDetector();}catch(e){console.log('No pose detection:',e);}
  poseLoop();

  speechSynthesis.getVoices();
  novaSay("Hi! I am Nova! Let's dance and sing together! Ready?");
  setTimeout(startSong, 3500);
};

window.addEventListener('load',()=>{
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();
});
</script>
