<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Dance v15</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#1a0533;color:#fff;font-family:'Nunito',sans-serif;display:flex;flex-direction:column;transition:background 0.1s}
body.window-open{background:#004422}

#topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);z-index:10;flex-shrink:0}
#logo{font-family:'Fredoka One',cursive;font-size:18px;background:linear-gradient(135deg,#ff6fd8,#7c6fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#score-display{font-family:'Fredoka One',cursive;font-size:16px;color:#ffd700}

#split{flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:0;position:relative}

/* CRITICAL FIX: SVG transform-origin defaults to SVG canvas origin (0,0) in Chrome.
   transform-box:fill-box makes it relative to the element itself (shoulder joint). */
#nova-larm, #nova-rarm, #nova-head, #nova-svg {
  transform-box: fill-box;
}
#nova-larm { transform-origin: 50% 0%; }  /* top of arm = shoulder */
#nova-rarm { transform-origin: 50% 0%; }
#nova-head { transform-origin: 50% 50%; }
#nova-svg  { transform-origin: 50% 50%; }
#nova-side{position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 30%,#3a0a6a 0%,#1a0340 60%,#0a0120 100%)}
#nova-wrap{width:min(260px,48vw)}
#nova-svg{width:100%;height:auto;filter:drop-shadow(0 0 24px rgba(255,111,216,0.5))}
#nova-label{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.5);border:1px solid rgba(255,111,216,0.4);
  border-radius:20px;padding:3px 14px;font-family:'Fredoka One',cursive;font-size:12px;
  color:#ff6fd8;white-space:nowrap}

/* CAM SIDE */
#cam-side{position:relative;background:#0a0a1a;overflow:hidden}
#webcam{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
#cam-label{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:3;
  background:rgba(0,0,0,0.5);border:1px solid rgba(0,210,255,0.4);
  border-radius:20px;padding:3px 14px;font-family:'Fredoka One',cursive;font-size:12px;color:#00d2ff}
#pills{position:absolute;top:8px;left:8px;z-index:3;display:flex;flex-direction:column;gap:4px}
.pill{background:rgba(0,0,0,0.7);border-radius:8px;padding:3px 8px;font-size:10px;font-weight:700;font-family:monospace}
.pill.on{background:#00ff99;color:#000}

/* GREEN FLASH OVERLAY */
#green-flash{position:fixed;inset:0;background:#00ff88;opacity:0;pointer-events:none;z-index:4;transition:opacity 0.08s}
#green-flash.show{opacity:0.35}

/* LYRICS + CUE */
#lyric-box{position:absolute;bottom:52px;left:0;right:0;text-align:center;z-index:5;pointer-events:none}
#lyric-text{font-family:'Fredoka One',cursive;font-size:clamp(18px,3.5vw,28px);
  color:#fff;text-shadow:0 2px 12px rgba(0,0,0,0.9);opacity:0;transition:opacity 0.25s}
#lyric-text.show{opacity:1}

#action-cue{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%) scale(0);
  z-index:6;text-align:center;pointer-events:none;transition:transform 0.25s cubic-bezier(.34,1.56,.64,1);
  background:rgba(0,0,0,0.85);border-radius:24px;padding:14px 22px;
  border:3px solid rgba(255,111,216,0.6);backdrop-filter:blur(8px);min-width:180px}
#action-cue.show{transform:translate(-50%,-50%) scale(1)}
#action-cue.live{border-color:#00ff99;box-shadow:0 0 40px rgba(0,255,150,0.5)}
#cue-emoji{font-size:clamp(52px,10vw,80px);display:block}
#cue-label{font-family:'Fredoka One',cursive;font-size:clamp(20px,4vw,30px);color:#ff6fd8;display:block;margin-top:4px}
#cue-instr{font-size:clamp(12px,2vw,16px);color:rgba(255,255,255,0.85);font-weight:700;display:block;margin-top:4px}
#cue-timer{height:5px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;margin-top:8px}
#cue-timer-fill{height:100%;width:100%;transform-origin:left;background:#00ff99}
@keyframes timerShrink{from{transform:scaleX(1)}to{transform:scaleX(0)}}

/* FEEDBACK */
#feedback{position:absolute;inset:0;opacity:0;pointer-events:none;z-index:7;transition:opacity 0.12s}
#feedback.hit{background:rgba(0,255,150,0.2);opacity:1}
#feedback.miss{background:rgba(255,100,0,0.15);opacity:1}
#score-pop{position:absolute;top:28%;left:50%;transform:translateX(-50%) scale(0);
  font-family:'Fredoka One',cursive;font-size:52px;z-index:8;pointer-events:none;
  transition:transform 0.2s cubic-bezier(.34,1.56,.64,1);text-shadow:0 0 20px currentColor}
#score-pop.show{transform:translateX(-50%) scale(1)}

#progress-bar{position:absolute;bottom:0;left:0;right:0;height:4px;background:rgba(255,255,255,0.1);z-index:9}
#progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#ff6fd8,#7c6fff,#00d2ff);transition:width 0.1s linear}

/* START SCREEN */
#start-screen{position:fixed;inset:0;z-index:50;background:radial-gradient(ellipse at 50% 30%,#2d0a5a,#1a0533);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:24px;text-align:center}
#start-screen h1{font-family:'Fredoka One',cursive;font-size:clamp(28px,6vw,44px);
  background:linear-gradient(135deg,#ff6fd8,#7c6fff,#00d2ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#start-screen p{font-size:14px;color:rgba(255,255,255,0.7);max-width:360px;line-height:1.6}
.start-btn{background:linear-gradient(135deg,#ff6fd8,#7c6fff);border:none;border-radius:50px;
  padding:14px 40px;font-family:'Fredoka One',cursive;font-size:22px;color:#fff;cursor:pointer;
  box-shadow:0 6px 28px rgba(124,111,255,0.5);transition:transform .2s}
.start-btn:hover{transform:scale(1.04)}

/* END SCREEN */
#end-screen{position:fixed;inset:0;z-index:55;background:radial-gradient(ellipse at 50% 30%,#2d0a5a,#1a0533);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px;text-align:center}
#end-screen h1{font-family:'Fredoka One',cursive;font-size:clamp(28px,6vw,42px);
  background:linear-gradient(135deg,#ff6fd8,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#end-stars{font-size:48px;letter-spacing:6px}
#end-score{font-family:'Fredoka One',cursive;font-size:28px;color:#ffd700}
#end-detail{font-size:15px;color:rgba(255,255,255,0.7)}
</style>
</head>

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════

// ══════════════════════════════════════════════
// NOVA ANIMATION
// ══════════════════════════════════════════════
const POSES = {
  idle:  { l:0.3,   r:-0.3  },
  left:  { l:-2.0,  r:-0.3  },  // left arm UP
  right: { l:0.3,   r:2.0   },  // right arm UP
  both:  { l:-2.1,  r:2.1   },  // both arms UP
  hype:  { l:-1.8,  r:1.8   },
};

function setNovaPose(pose, durationMs){
  novaPose = pose;
  if(novaPoseTimer) clearTimeout(novaPoseTimer);
  if(durationMs) novaPoseTimer = setTimeout(() => { novaPose='idle'; }, durationMs);
}

function novaHelloArm(side){
  if(novaPose !== 'idle') return;
  if(side === 'L'){
    novaLRot = -120;
    setTimeout(() => { if(novaPose==='idle') novaLRot = 0; }, 900);
  } else {
    novaRRot = 120;
    setTimeout(() => { if(novaPose==='idle') novaRRot = 0; }, 900);
  }
}

// ══════════════════════════════════════════════
// NOVA ANIMATION — powered by Anime.js
// Anime.js handles SVG transform-origin correctly across browsers
// ══════════════════════════════════════════════
let idleArmAnim = null;
let idleBodyAnim = null;

function startIdleDance(){
  // Stop any existing idle
  if(idleArmAnim) idleArmAnim.pause();
  if(idleBodyAnim) idleBodyAnim.pause();

  // Arms swing side to side to beat (108 BPM = 555ms per beat)
  // Use SVG transform rotate with exact pivot
  idleArmAnim = anime({
    targets: '#nova-larm',
    rotate: [
      { value: -15, duration: 555 },
      { value: 15, duration: 555 }
    ],
    direction: 'alternate',
    loop: true,
    easing: 'easeInOutSine',
    transformOrigin: '68px 178px'
  });
  anime({
    targets: '#nova-rarm',
    rotate: [
      { value: 15, duration: 555 },
      { value: -15, duration: 555 }
    ],
    direction: 'alternate',
    loop: true,
    easing: 'easeInOutSine',
    transformOrigin: '132px 178px'
  });

  // Body bounce
  idleBodyAnim = anime({
    targets: '#nova-svg',
    translateY: [
      { value: 0, duration: 277 },
      { value: -8, duration: 277 }
    ],
    direction: 'alternate',
    loop: true,
    easing: 'easeInOutSine'
  });

  // Head bob
  anime({
    targets: '#nova-head',
    translateY: [
      { value: 0, duration: 400 },

    ],
    direction: 'alternate',

    transformOrigin: '100px 90px'
  });
}

function setArmPose(leftDeg, rightDeg, duration){
  anime.remove('#nova-larm');
  anime.remove('#nova-rarm');
  anime({
    targets: '#nova-larm',
    rotate: leftDeg,
    duration: duration || 350,
    easing: 'easeOutBack',
    transformOrigin: '68px 178px'
  });
  anime({
    targets: '#nova-rarm',
    rotate: rightDeg,
    duration: duration || 350,
    easing: 'easeOutBack',
    transformOrigin: '132px 178px'
  });
}

function setNovaPose(pose, durationMs){
  novaPose = pose;
  if(novaPoseTimer) clearTimeout(novaPoseTimer);

  if(pose === 'idle'){
    startIdleDance();
    return;
  }
  if(pose === 'left')  setArmPose(-130, 0);    // left arm up
  if(pose === 'right') setArmPose(0, 130);     // right arm up
  if(pose === 'both')  setArmPose(-140, 140);  // both up
  if(pose === 'hype')  setArmPose(-120, 120);

  if(durationMs){
    novaPoseTimer = setTimeout(() => {
      novaPose = 'idle';
      startIdleDance();
    }, durationMs);
  }
}

function novaHelloArm(side){
  if(novaPose !== 'idle') return;
  if(side === 'L'){
    anime.remove('#nova-larm');
    anime({
      targets: '#nova-larm',
      rotate: [
        { value: -120, duration: 250, easing: 'easeOutBack' },
        { value: 0, duration: 600, easing: 'easeInOutSine' }
      ],
      transformOrigin: '68px 178px',
      complete: () => { if(novaPose === 'idle') startIdleDance(); }
    });
  } else {
    anime.remove('#nova-rarm');
    anime({
      targets: '#nova-rarm',
      rotate: [
        { value: 120, duration: 250, easing: 'easeOutBack' },
        { value: 0, duration: 600, easing: 'easeInOutSine' }
      ],
      transformOrigin: '132px 178px',
      complete: () => { if(novaPose === 'idle') startIdleDance(); }
    });
  }
}

// ══════════════════════════════════════════════
// POSE DETECTION (from v14 — proven working)
// ══════════════════════════════════════════════
async function initDetector(){
  await tf.setBackend('webgl');
  await tf.ready();
  detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING }
  );
}

function smoothKp(key, kp){
  if(!smooth[key]) smooth[key] = { x:kp.x, y:kp.y, score:kp.score };
  const a = 0.7;
  smooth[key].x = smooth[key].x * a + kp.x * (1-a);
  smooth[key].y = smooth[key].y * a + kp.y * (1-a);
  smooth[key].score = kp.score;
  return smooth[key];
}

async function poseLoop(){
  const video = document.getElementById('webcam');
  if(!detector || !video || video.readyState < 2){ requestAnimationFrame(poseLoop); return; }
  try {
    const poses = await detector.estimatePoses(video, { flipHorizontal:false });
    if(poses.length > 0) analyzePose(poses[0].keypoints);
  } catch(e){}
  requestAnimationFrame(poseLoop);
}

function analyzePose(kps){
  const get = n => kps.find(k => k.name === n);
  const ls = get('left_shoulder'), rs = get('right_shoulder');
  const lw = get('left_wrist'), rw = get('right_wrist');
  if(!ls || !rs || !lw || !rw) return;

  const sLs = smoothKp('ls', ls), sRs = smoothKp('rs', rs);
  const sLw = smoothKp('lw', lw), sRw = smoothKp('rw', rw);
  const MIN = 0.3;
  const scale = Math.max(Math.abs(sLs.x - sRs.x), 60);
  const thr = scale * 0.24;

  const lUp = sLw.score > MIN && (sLs.y - sLw.y) > thr;
  const rUp = sRw.score > MIN && (sRs.y - sRw.y) > thr;

  const hold = (raw, key) => {
    holdCount[key] = raw ? Math.min(holdCount[key]+1, 10) : Math.max(holdCount[key]-1, 0);
    return holdCount[key] >= HOLD;
  };

  moves.left  = hold(lUp && !rUp, 'left');
  moves.right = hold(rUp && !lUp, 'right');
  moves.both  = lUp && rUp;

  setPill('p-left',  '👈 L', moves.left);
  setPill('p-right', '👉 R', moves.right);
  setPill('p-both',  '🙌',   moves.both);
}

function setPill(id, label, on){
  const el = document.getElementById(id);
  if(!el) return;
  el.classList.toggle('on', on);
  el.textContent = `${label} ${on?'✅':'—'}`;
}

function checkAction(action){
  if(action === 'left')  return moves.left;
  if(action === 'right') return moves.right;
  if(action === 'both')  return moves.both;
  return false;
}

// ══════════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════════
function showLyric(text){
  const el = document.getElementById('lyric-text');
  el.textContent = text;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

function showCue(emoji, label, instr, isLive, windowMs){
  const cue = document.getElementById('action-cue');
  document.getElementById('cue-emoji').textContent = emoji;
  document.getElementById('cue-label').textContent = label;
  document.getElementById('cue-instr').textContent = instr;
  cue.classList.add('show');
  if(isLive){
    cue.classList.add('live');
    const tf = document.getElementById('cue-timer-fill');
    tf.style.animation = 'none';
    void tf.offsetWidth;
    tf.style.animation = `timerShrink ${windowMs}ms linear forwards`;
  } else {
    cue.classList.remove('live');
    const tf = document.getElementById('cue-timer-fill');
    tf.style.animation = 'none';
    tf.style.transform = 'scaleX(1)';
  }
}

function hideCue(){
  const cue = document.getElementById('action-cue');
  cue.classList.remove('show', 'live');
}

function flashFeedback(type){
  const f = document.getElementById('feedback');
  f.className = type;
  setTimeout(() => f.className = '', 600);
}

function showScorePop(pts, color){
  const el = document.getElementById('score-pop');
  el.textContent = '+' + pts;
  el.style.color = color || '#ffd700';
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 900);
}

function setGreenFlash(on){
  document.getElementById('green-flash').classList.toggle('show', on);
  document.body.classList.toggle('window-open', on);
}

function speak(text){
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 1.0; u.pitch = 1.2;
    const voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
    const preferred = voices.find(v => /Samantha|Karen|Google.*Female|Zira/i.test(v.name)) || voices[0];
    if(preferred) u.voice = preferred;
    speechSynthesis.speak(u);
  } catch(e){}
}

// ══════════════════════════════════════════════
// SONG LOOP
// ══════════════════════════════════════════════
function startSong(){
  timelineIdx = 0;
  const audio = new Audio('hello.mp3');
  audio.volume = 0.85;
  window._songAudio = audio;
  audio.play().catch(() => {});
  audio.onended = () => setTimeout(endGame, 1000);

  setNovaPose('hype', 1800);

  songTimer = setInterval(() => {
    const elapsed = window._songAudio && !window._songAudio.paused
      ? window._songAudio.currentTime * 1000
      : 0;

    document.getElementById('progress-fill').style.width =
      Math.min(100, (elapsed / SONG_DURATION) * 100) + '%';

    while(timelineIdx < TIMELINE.length && elapsed >= TIMELINE[timelineIdx].t){
      const e = TIMELINE[timelineIdx];

      if(e.type === 'lyric'){
        showLyric(e.text);
      }
      else if(e.type === 'helloL'){
        showLyric(e.lyric || 'Hello,');
        novaHelloArm('L');
      }
      else if(e.type === 'helloR'){
        showLyric(e.lyric || 'hello.');
        novaHelloArm('R');
      }
      else if(e.type === 'demo'){
        setNovaPose(e.action, 2400);
        showCue(e.emoji, e.label, e.instr, false, 0);
      }
      else if(e.type === 'open'){
        currentAction = e;
        actionDetected = false;
        actionWindow = true;
        actionStartTime = Date.now();
        attempts++;

        // Find window duration
        let windowMs = 2500;
        for(let j = timelineIdx+1; j < TIMELINE.length; j++){
          if(TIMELINE[j].type === 'close' && TIMELINE[j].action === e.action){
            windowMs = TIMELINE[j].t - e.t;
            break;
          }
        }

        setGreenFlash(true);
        showCue(e.emoji, e.label, e.instr, true, windowMs);
        setNovaPose(e.action, windowMs);

        let elapsed2 = 0;
        const checker = setInterval(() => {
          elapsed2 += 80;
          if(!actionWindow || actionDetected || elapsed2 > windowMs + 200){
            clearInterval(checker);
            return;
          }
          if(checkAction(e.action)){
            actionDetected = true;
            clearInterval(checker);
            const reactionMs = Date.now() - actionStartTime;
            const isGreat = reactionMs < 1000;
            const pts = isGreat ? Math.round(e.pts * 1.5) : e.pts;
            score += pts; hits++; combo++;
            maxCombo = Math.max(maxCombo, combo);
            document.getElementById('score-display').textContent = score + ' pts';
            flashFeedback('hit');
            showScorePop(pts, isGreat ? '#ffd700' : '#00ff99');
            setNovaPose('hype', 1000);
            if(isGreat) speak('Great!');
          }
        }, 80);
      }
      else if(e.type === 'close'){
        setGreenFlash(false);
        hideCue();
        if(!actionDetected && actionWindow){
          combo = 0;
          flashFeedback('miss');
        }
        actionWindow = false;
      }

      timelineIdx++;
    }
  }, 80);
}

function endGame(){
  clearInterval(songTimer);
  setGreenFlash(false);
  if(window._songAudio){ window._songAudio.pause(); }
  setNovaPose('hype', 99999);

  const rate = attempts > 0 ? hits/attempts : 0;
  let stars = rate >= 0.9 ? 5 : rate >= 0.7 ? 4 : rate >= 0.5 ? 3 : rate >= 0.3 ? 2 : 1;
  const titles = ['Keep trying!','Good job!','Great!','Amazing!','PERFECT! 🔥'];

  document.getElementById('end-title').textContent = titles[stars-1];
  document.getElementById('end-stars').textContent = '⭐'.repeat(stars) + '☆'.repeat(5-stars);
  document.getElementById('end-score').textContent = score + ' pts';
  document.getElementById('end-detail').textContent = `${hits} of ${attempts} moves · Best combo: ${maxCombo}`;
  document.getElementById('end-screen').style.display = 'flex';
  speak(`Wow! You hit ${hits} out of ${attempts} moves!`);
}

function restartGame(){
  score = 0; hits = 0; attempts = 0; combo = 0; maxCombo = 0;
  document.getElementById('score-display').textContent = '0 pts';
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('end-screen').style.display = 'none';
  startSong();
}

// ══════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════
window.beginGame = async function(){
  document.getElementById('start-screen').style.display = 'none';
  speechSynthesis.getVoices();

  // Camera + mic together
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width:{ideal:1280}, height:{ideal:720}, facingMode:'user' },
      audio: false  // no mic needed (no clap detection)
    });
    const video = document.getElementById('webcam');
    video.muted = true;
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);
    await video.play();
  } catch(e){
    alert('Camera needed: ' + e.message);
    return;
  }

  // Load pose model
  try { await initDetector(); } catch(e){ console.log('No pose detection:', e); }
  poseLoop();

  speak("Let's dance with Nova! Watch me, then copy!");
  setTimeout(startSong, 2500);
};

// Draw Nova when page loads
window.addEventListener('load', () => {
  buildNova();
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
  // Start the idle dance immediately so Nova is alive on start screen
  setTimeout(() => startIdleDance(), 100);
});
