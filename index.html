<title>Nova Dance</title>
<style>

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#1a0533;color:#fff;font-family:'Nunito',sans-serif;display:flex;flex-direction:column;transition:background 0.15s}

#topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);z-index:10;flex-shrink:0}

#score-display{font-family:'Fredoka One',cursive;font-size:16px;color:#ffd700}

#split{flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:0;position:relative}

#nova-side{position:relative;overflow:hidden;background:radial-gradient(ellipse at 50% 30%,#3a0a6a 0%,#1a0340 60%,#0a0120 100%)}
#avatar-canvas{width:100%;height:100%;display:block}
#nova-label{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.5);border:1px solid rgba(255,111,216,0.4);border-radius:20px;padding:3px 14px;font-family:'Fredoka One',cursive;font-size:12px;color:#ff6fd8;white-space:nowrap;z-index:2}

#nova-bubble.show{opacity:1}
#nova-bubble::after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid rgba(124,111,255,0.95)}

#cam-side{position:relative;background:#0a0a1a;overflow:hidden}
#webcam{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
#cam-label{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:3;background:rgba(0,0,0,0.5);border:1px solid rgba(0,210,255,0.4);border-radius:20px;padding:3px 14px;font-family:'Fredoka One',cursive;font-size:12px;color:#00d2ff}

#green-flash{position:fixed;inset:0;background:#00ff88;opacity:0;pointer-events:none;z-index:4;transition:opacity 0.08s}

#lyric-box{position:absolute;bottom:52px;left:0;right:0;text-align:center;z-index:5;pointer-events:none}

#cue-timer{height:5px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;margin-top:8px}
#cue-timer-fill{height:100%;width:100%;transform-origin:left;background:#00ff99}
@keyframes timerShrink{from{transform:scaleX(1)}to{transform:scaleX(0)}}

// LLM — Claude Haiku via Anthropic API
// Generates Nova's reactions in real time
// ═══════════════════════════════════════════
async function novaThink(context) {
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 60,
        system: `You are Nova, a super fun and encouraging AI dance teacher for young kids aged 3-8. 
You speak in short, punchy, VERY enthusiastic sentences. Max 8 words. 
Use simple words. Be warm, funny and celebratory.
Never say anything negative. Always encourage.`,
        messages: [{ role: 'user', content: context }]
      })
    });
    const data = await res.json();
    return data.content?.[0]?.text || '';
  } catch(e) {
    return '';
  }
}

// ═══════════════════════════════════════════
// VRM AVATAR
// ═══════════════════════════════════════════
let vrm=null, expressionManager=null;
const targetPose = {};
const clock = new THREE.Clock();
let danceTime = 0;
const VISEMES = ['aa','ih','ou','ee','oh'];
let visemeActive=false, currentViseme='aa', visemeTimer=0;
let mouthOpenAmt = 0; // smooth mouth open for lipsync

async function loadVRM(){
  const loader = new GLTFLoader();
  loader.register(p => new VRMLoaderPlugin(p));
  return new Promise((res, rej) => {
    loader.load(VRM_URL, gltf => {
      vrm = gltf.userData.vrm;
      VRMUtils.removeUnnecessaryVertices(gltf.scene);
      VRMUtils.removeUnnecessaryJoints(gltf.scene);
      vrm.scene.traverse(o => o.frustumCulled = false);
      vrm.scene.rotation.y = 0; // face forward
      scene.add(vrm.scene);
      expressionManager = vrm.expressionManager;
      console.log('VRM loaded. Expressions:', expressionManager?.expressions?.map(e=>e.expressionName));
      res();
    }, null, rej);
  });
}

function getBone(n){ return vrm?.humanoid?.getNormalizedBoneNode(n) || null; }
function setBone(n,x,y,z){ targetPose[n] = new THREE.Euler(x,y,z); }
function clearPose(){ Object.keys(targetPose).forEach(k=>delete targetPose[k]); }

function applyPose(pose){
  clearPose();
  if(pose === 'left'){
    // Left arm raises UP — forward rotation on x axis
    setBone('leftUpperArm', -1.6, 0, 0.15);
    setBone('leftLowerArm', -0.3, 0, 0);
  } else if(pose === 'right'){
    // Right arm raises UP
    setBone('rightUpperArm', -1.6, 0, -0.15);
    setBone('rightLowerArm', -0.3, 0, 0);
  } else if(pose === 'both' || pose === 'hype'){
    // Both arms UP
    setBone('leftUpperArm', -1.7, 0, 0.15);
    setBone('leftLowerArm', -0.2, 0, 0);
    setBone('rightUpperArm', -1.7, 0, -0.15);
    setBone('rightLowerArm', -0.2, 0, 0);
  }
  // idle = no targets set, lerps to 0 naturally
}

function setNovaPose(pose, durationMs){
  novaPose = pose;
  if(novaPoseTimer) clearTimeout(novaPoseTimer);
  applyPose(pose);
  if(durationMs) novaPoseTimer = setTimeout(() => { novaPose='idle'; clearPose(); }, durationMs);
}

function novaHelloArm(side){
  if(novaPose !== 'idle') return;
  if(side === 'L'){
    setBone('leftUpperArm', -1.6, 0, 0.1);
    setBone('leftLowerArm', -0.3, 0, 0);
    setTimeout(() => { if(novaPose==='idle'){ delete targetPose['leftUpperArm']; delete targetPose['leftLowerArm']; } }, 800);
  } else {
    setBone('rightUpperArm', -1.6, 0, -0.1);
    setBone('rightLowerArm', -0.3, 0, 0);
    setTimeout(() => { if(novaPose==='idle'){ delete targetPose['rightUpperArm']; delete targetPose['rightLowerArm']; } }, 800);
  }
}

function updateVRM(dt){
  if(!vrm) return;
  danceTime += dt;

  // Subtle head bob — alive but not distracting
  const head = getBone('head');
  if(head){
    head.rotation.y = Math.sin(danceTime * 0.8) * 0.05;
    head.rotation.z = Math.sin(danceTime * 1.1) * 0.02;
  }

  // Gentle spine sway — alive feel
  const spine = getBone('spine');
  if(spine){
    spine.rotation.z = Math.sin(danceTime * 0.9) * 0.015;
  }

  // Smooth lerp for all arm bones
  ['leftUpperArm','rightUpperArm','leftLowerArm','rightLowerArm','spine','chest','neck','head'].forEach(n => {
    const bone = getBone(n);
    if(!bone) return;
    const tgt = targetPose[n];
    const spd = 0.14;
    if(tgt){
      bone.rotation.x += (tgt.x - bone.rotation.x) * spd;
      bone.rotation.y += (tgt.y - bone.rotation.y) * spd;
      bone.rotation.z += (tgt.z - bone.rotation.z) * spd;
    } else {
      bone.rotation.x += (0 - bone.rotation.x) * 0.08;
      bone.rotation.y += (0 - bone.rotation.y) * 0.08;
      bone.rotation.z += (0 - bone.rotation.z) * 0.08;
    }
  });

  // LIPSYNC — smooth mouth open/close
  if(expressionManager){
    VISEMES.forEach(v => { try{ expressionManager.setValue(v, 0); }catch(e){} });

    if(visemeActive){
      visemeTimer += dt;
      // Natural mouth movement — sine wave with varying freq
      const wave = Math.abs(Math.sin(visemeTimer * 8 + Math.sin(visemeTimer * 3) * 0.5));
      mouthOpenAmt += (wave * 0.9 - mouthOpenAmt) * 0.25;
      try{ expressionManager.setValue(currentViseme, mouthOpenAmt); }catch(e){}
    } else {
      mouthOpenAmt += (0 - mouthOpenAmt) * 0.15;
      try{ expressionManager.setValue('aa', mouthOpenAmt); }catch(e){}
    }

    // Natural blinking
    if(Math.random() < 0.003 && !window._blinking){
      window._blinking = true;
      const t0 = Date.now();
      const blink = () => {
        const e = Date.now() - t0;
        if(e > 200){ try{expressionManager.setValue('blink', 0);}catch(e){} window._blinking=false; return; }
        const v = e < 80 ? e/80 : Math.max(0, 1-(e-80)/120);
        try{ expressionManager.setValue('blink', v); }catch(e){}
        requestAnimationFrame(blink);
      };
      blink();
    }

    // Happy expression on hit
    if(window._showHappy){
      window._showHappy -= dt;
      try{ expressionManager.setValue('happy', Math.min(1, window._showHappy * 2)); }catch(e){}
    } else {
      try{ expressionManager.setValue('happy', 0); }catch(e){}
    }
  }

  vrm.update(dt);
}

function renderLoop(){
  requestAnimationFrame(renderLoop);
  updateVRM(clock.getDelta());
  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════
// POSE DETECTION
// ═══════════════════════════════════════════
let detector = null;
const moves = { left:false, right:false, both:false };
const holdCount = { left:0, right:0, both:0 };
const smooth = {};

async function initDetector(){
  await tf.setBackend('webgl');
  await tf.ready();
  detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING }
  );
}

function smoothKp(key, kp){
  if(!smooth[key]) smooth[key] = {x:kp.x,y:kp.y,score:kp.score};
  const a = 0.7;
  smooth[key].x = smooth[key].x*a + kp.x*(1-a);
  smooth[key].y = smooth[key].y*a + kp.y*(1-a);
  smooth[key].score = kp.score;
  return smooth[key];
}

async function poseLoop(){
  const v = document.getElementById('webcam');
  if(!detector||!v||v.readyState<2){ requestAnimationFrame(poseLoop); return; }
  try{
    const p = await detector.estimatePoses(v, {flipHorizontal:false});
    if(p.length > 0) analyzePose(p[0].keypoints);
  }catch(e){}
  requestAnimationFrame(poseLoop);
}

function analyzePose(kps){
  const g = n => kps.find(k=>k.name===n);
  const ls=g('left_shoulder'),rs=g('right_shoulder'),lw=g('left_wrist'),rw=g('right_wrist');
  if(!ls||!rs||!lw||!rw) return;
  const sLs=smoothKp('ls',ls),sRs=smoothKp('rs',rs),sLw=smoothKp('lw',lw),sRw=smoothKp('rw',rw);
  const MIN=0.3, scale=Math.max(Math.abs(sLs.x-sRs.x),60), thr=scale*0.24;
  const lUp=sLw.score>MIN&&(sLs.y-sLw.y)>thr;
  const rUp=sRw.score>MIN&&(sRs.y-sRw.y)>thr;
  const hold=(raw,key)=>{ holdCount[key]=raw?Math.min(holdCount[key]+1,10):Math.max(holdCount[key]-1,0); return holdCount[key]>=2; };
  moves.left  = hold(lUp&&!rUp,'left');
  moves.right = hold(rUp&&!lUp,'right');
  moves.both  = lUp&&rUp;
  const sp=(id,lbl,on)=>{ const el=document.getElementById(id); if(!el)return; el.classList.toggle('on',on); el.textContent=lbl+(on?' ON':'--'); };
  sp('p-left','L arm ',moves.left);
  sp('p-right','R arm ',moves.right);
  sp('p-both','BOTH ',moves.both);
}

function checkAction(a){ return a==='left'?moves.left:a==='right'?moves.right:a==='both'?moves.both:false; }

// ═══════════════════════════════════════════
// SPEECH + LIPSYNC + LLM BUBBLE
// ═══════════════════════════════════════════
let speechQueue = [];
let isSpeaking = false;

async function novaSpeak(text, llmContext){
  // Show bubble
  if(llmContext){
    // Ask LLM for a fun reaction
    novaThink(llmContext).then(reply => {
      if(reply) showBubble(reply);
    });
  } else {
    showBubble(text);
  }

  // TTS with lipsync
  speechQueue.push(text);
  if(isSpeaking) return;
  processSpeechQueue();
}

function processSpeechQueue(){
  if(!speechQueue.length){ isSpeaking=false; return; }
  isSpeaking = true;
  const text = speechQueue.shift();
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 0.95; u.pitch = 1.3; u.volume = 1.0;
    const voices = speechSynthesis.getVoices().filter(v=>v.lang.startsWith('en'));
    const pref = voices.find(v=>/Samantha|Karen|Google.*Female|Zira/i.test(v.name)) || voices[0];
    if(pref) u.voice = pref;
    visemeActive = true; currentViseme = 'aa'; visemeTimer = 0;
    u.onboundary = () => { currentViseme = VISEMES[Math.floor(Math.random()*VISEMES.length)]; };
    u.onend = () => { visemeActive = false; setTimeout(processSpeechQueue, 200); };
    speechSynthesis.speak(u);
  }catch(e){ isSpeaking=false; }
}

function showBubble(text){
  const b = document.getElementById('nova-bubble');
  document.getElementById('bubble-text').textContent = text;
  b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 3500);
}

// ═══════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════
function showLyric(t){ const el=document.getElementById('lyric-text'); el.textContent=t; el.classList.remove('show'); void el.offsetWidth; el.classList.add('show'); }

function showCue(emoji,label,instr,isLive,ms){
  const c = document.getElementById('action-cue');
  document.getElementById('cue-emoji').textContent = emoji;
  document.getElementById('cue-label').textContent = label;
  document.getElementById('cue-instr').textContent = instr;
  c.classList.add('show');
  if(isLive){
    c.classList.add('live');
    const tf = document.getElementById('cue-timer-fill');
    tf.style.animation = 'none'; void tf.offsetWidth;
    tf.style.animation = 'timerShrink '+ms+'ms linear forwards';
  } else {
    c.classList.remove('live');
  }
}

function hideCue(){ document.getElementById('action-cue').classList.remove('show','live'); }

function flashFeedback(t){ const f=document.getElementById('feedback'); f.className=t; setTimeout(()=>f.className='',600); }

function showScorePop(pts,color){ const el=document.getElementById('score-pop'); el.textContent='+'+pts; el.style.color=color||'#ffd700'; el.classList.remove('show'); void el.offsetWidth; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),900); }

function setGreenFlash(on){ document.getElementById('green-flash').classList.toggle('show',on); document.body.classList.toggle('window-open',on); }

// ═══════════════════════════════════════════
// SONG LOOP
// ═══════════════════════════════════════════
// LLM reaction phrases — called async so they don't block game
const HIT_CONTEXTS = [
  'The child just raised their arm correctly! React with excitement! Max 6 words.',
  'Great job! The kid nailed the move! 6 words of celebration!',
  'The child is doing amazing at dancing! 6 words!',
];
const MISS_CONTEXTS = [
  'The child missed the move but encourage them! 6 words.',
  'Keep going! The child needs encouragement! Max 6 words.',
];

let llmCooldown = false;
function maybeLLM(context){
  if(llmCooldown) return;
  llmCooldown = true;
  setTimeout(()=>llmCooldown=false, 8000); // max once per 8 sec
  novaSpeak('', context);
}

function startSong(){
  timelineIdx = 0;
  const audio = new Audio('hello.mp3');
  audio.volume = 0.85;
  window._songAudio = audio;
  audio.play().catch(()=>{});
  audio.onended = () => setTimeout(endGame, 1000);
  setNovaPose('hype', 1800);

  songTimer = setInterval(()=>{
    const elapsed = window._songAudio&&!window._songAudio.paused ? window._songAudio.currentTime*1000 : 0;
    document.getElementById('progress-fill').style.width = Math.min(100,(elapsed/SONG_DURATION)*100)+'%';

    while(timelineIdx<TIMELINE.length && elapsed>=TIMELINE[timelineIdx].t){
      const e = TIMELINE[timelineIdx];
      if(e.type==='lyric') showLyric(e.text);
      else if(e.type==='helloL'){ showLyric(e.lyric||'Hello,'); novaHelloArm('L'); }
      else if(e.type==='helloR'){ showLyric(e.lyric||'hello.'); novaHelloArm('R'); }
      else if(e.type==='demo'){ setNovaPose(e.action, 2400); showCue(e.emoji, e.label, e.instr, false, 0); }
      else if(e.type==='open'){
        currentAction=e; actionDetected=false; actionWindow=true;
        actionStartTime=Date.now(); attempts++;
        let wMs=2500;
        for(let j=timelineIdx+1;j<TIMELINE.length;j++){
          if(TIMELINE[j].type==='close'&&TIMELINE[j].action===e.action){ wMs=TIMELINE[j].t-e.t; break; }
        }
        setGreenFlash(true);
        showCue(e.emoji, e.label, e.instr, true, wMs);
        setNovaPose(e.action, wMs);
        let el2=0;
        const chk = setInterval(()=>{
          el2+=80;
          if(!actionWindow||actionDetected||el2>wMs+200){ clearInterval(chk); return; }
          if(checkAction(e.action)){
            actionDetected=true; clearInterval(chk);
            const rm=Date.now()-actionStartTime, isGreat=rm<1000;
            const pts=isGreat?Math.round(e.pts*1.5):e.pts;
            score+=pts; hits++; combo++; maxCombo=Math.max(maxCombo,combo);
            document.getElementById('score-display').textContent=score+' pts';
            flashFeedback('hit'); showScorePop(pts, isGreat?'#ffd700':'#00ff99');
            setNovaPose('hype',1200);
            window._showHappy = 1.5; // trigger happy expression
            // LLM reaction
            maybeLLM(HIT_CONTEXTS[Math.floor(Math.random()*HIT_CONTEXTS.length)]);
          }
        }, 80);
      }
      else if(e.type==='close'){
        setGreenFlash(false); hideCue();
        if(!actionDetected&&actionWindow){
          combo=0; flashFeedback('miss');
          maybeLLM(MISS_CONTEXTS[Math.floor(Math.random()*MISS_CONTEXTS.length)]);
        }
        actionWindow=false;
      }
      timelineIdx++;
    }
  }, 80);
}

function endGame(){
  clearInterval(songTimer); setGreenFlash(false);
  if(window._songAudio) window._songAudio.pause();
  setNovaPose('hype', 99999);
  const rate=attempts>0?hits/attempts:0;
  const stars=rate>=0.9?5:rate>=0.7?4:rate>=0.5?3:rate>=0.3?2:1;
  document.getElementById('end-title').textContent=['Keep trying!','Good job!','Great!','Amazing!','PERFECT! &#128293;'][stars-1];
  document.getElementById('end-stars').textContent='&#11088;'.repeat(stars)+'&#9734;'.repeat(5-stars);
  document.getElementById('end-score').textContent=score+' pts';
  document.getElementById('end-detail').textContent=hits+' of '+attempts+' moves. Best combo: '+maxCombo;
  document.getElementById('end-screen').style.display='flex';
  // Ask LLM for end message
  novaThink('The dance session ended! The child hit '+hits+' out of '+attempts+' moves. Give an amazing celebration! 8 words max.').then(msg=>{
    if(msg) novaSpeak(msg);
    else novaSpeak('You are a superstar dancer!');
  });
}

window.restartGame = function(){
  score=0;hits=0;attempts=0;combo=0;maxCombo=0;
  document.getElementById('score-display').textContent='0 pts';
  document.getElementById('progress-fill').style.width='0%';
  document.getElementById('end-screen').style.display='none';
  startSong();
};

window.beginGame = async function(){
  document.getElementById('start-screen').style.display='none';
  try{
    const stream = await navigator.mediaDevices.getUserMedia({video:{width:{ideal:1280},height:{ideal:720},facingMode:'user'},audio:false});
    const v = document.getElementById('webcam');
    v.srcObject=stream; await new Promise(r=>v.onloadedmetadata=r); await v.play();
  }catch(e){ alert('Camera needed: '+e.message); return; }
  try{ await initDetector(); }catch(e){ console.log('No detection:',e); }
  poseLoop();
  speechSynthesis.getVoices();
  // LLM welcome message
  novaThink("A child is starting a dance game! Say a super fun welcome! Max 8 words.").then(msg=>{
    novaSpeak(msg || "Hi! Let's dance together! Yay!");
  });
  setTimeout(startSong, 3000);
};

// BOOT — load VRM at page load so it's ready
window.addEventListener('load', async()=>{
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
  resizeRenderer();
  try{
    await loadVRM();
    console.log('VRM ready');
  } catch(e){
    console.error('VRM failed:', e.message);
  }
  renderLoop();
});
</script>
