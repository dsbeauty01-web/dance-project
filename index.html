let score=0,hits=0,attempts=0,combo=0,maxCombo=0;
let timelineIdx=0,songTimer=null;
let currentAction=null,actionDetected=false,actionWindow=false,actionStartTime=0;
let novaPose='idle',novaPoseTimer=null;

const canvas=document.getElementById('avatar-canvas');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.outputColorSpace=THREE.SRGBColorSpace;
const scene=new THREE.Scene();
scene.add(new THREE.AmbientLight(0xffffff,0.8));
const kl=new THREE.DirectionalLight(0xfff0e0,1.2);kl.position.set(2,4,3);scene.add(kl);
const fl=new THREE.DirectionalLight(0xffc0e0,0.5);fl.position.set(-2,2,2);scene.add(fl);
const camera=new THREE.PerspectiveCamera(30,1,0.1,100);
camera.position.set(0,1.3,2.8);camera.lookAt(0,1.2,0);

function resizeRenderer(){const w=canvas.clientWidth,h=canvas.clientHeight;if(!w||!h)return;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}
window.addEventListener('resize',resizeRenderer);

let vrm=null,expressionManager=null;
const targetPose={};
const clock=new THREE.Clock();
let danceTime=0;
const VISEMES=['aa','ih','ou','ee','oh'];
let visemeActive=false,currentViseme='aa',visemeTimer=0;

async function loadVRM(){
  const loader=new GLTFLoader();
  loader.register(p=>new VRMLoaderPlugin(p));
  return new Promise((res,rej)=>{
    loader.load(VRM_URL,gltf=>{
      vrm=gltf.userData.vrm;
      VRMUtils.removeUnnecessaryVertices(gltf.scene);
      VRMUtils.removeUnnecessaryJoints(gltf.scene);
      vrm.scene.traverse(o=>o.frustumCulled=false);
      vrm.scene.rotation.y=0;
      scene.add(vrm.scene);
      expressionManager=vrm.expressionManager;
      res();
    },null,rej);
  });
}

function getBone(n){return vrm?.humanoid?.getNormalizedBoneNode(n)||null;}
function setBone(n,x,y,z){targetPose[n]=new THREE.Euler(x,y,z);}
function clearPose(){Object.keys(targetPose).forEach(k=>delete targetPose[k]);}

function applyPose(pose){
  clearPose();
  if(pose==='left') setBone('leftUpperArm',0,0,2.0);
  else if(pose==='right') setBone('rightUpperArm',0,0,-2.0);
  else if(pose==='both'||pose==='hype'){setBone('leftUpperArm',0,0,2.3);setBone('rightUpperArm',0,0,-2.3);}
}

function setNovaPose(pose,durationMs){
  novaPose=pose;
  if(novaPoseTimer)clearTimeout(novaPoseTimer);
  applyPose(pose);
  if(durationMs)novaPoseTimer=setTimeout(()=>{novaPose='idle';clearPose();},durationMs);
}

function novaHelloArm(side){
  if(novaPose!=='idle')return;
  if(side==='L'){setBone('leftUpperArm',0,0,2.0);setTimeout(()=>{if(novaPose==='idle')delete targetPose['leftUpperArm'];},800);}
  else{setBone('rightUpperArm',0,0,-2.0);setTimeout(()=>{if(novaPose==='idle')delete targetPose['rightUpperArm'];},800);}
}

function updateVRM(dt){
  if(!vrm)return;
  danceTime+=dt;
  const bHz=(108/60)*Math.PI*2,beat=Math.sin(danceTime*bHz);
  const hips=getBone('hips');
  if(hips){hips.rotation.z=Math.sin(danceTime*bHz*0.5)*0.06;hips.position.y=Math.abs(beat)*-0.02;}
  const spine=getBone('spine');
  if(spine)spine.rotation.z=-Math.sin(danceTime*bHz*0.5)*0.03;
  if(novaPose==='idle'){setBone('leftUpperArm',0,0,0.3+beat*0.35);setBone('rightUpperArm',0,0,-0.3-beat*0.35);}
  ['leftUpperArm','rightUpperArm','leftLowerArm','rightLowerArm','spine','chest','neck','head'].forEach(n=>{
    const b=getBone(n);if(!b)return;
    const t=targetPose[n],s=0.18;
    if(t){b.rotation.x+=(t.x-b.rotation.x)*s;b.rotation.y+=(t.y-b.rotation.y)*s;b.rotation.z+=(t.z-b.rotation.z)*s;}
    else{b.rotation.x+=(0-b.rotation.x)*0.1;b.rotation.y+=(0-b.rotation.y)*0.1;b.rotation.z+=(0-b.rotation.z)*0.1;}
  });
  if(expressionManager){
    VISEMES.forEach(v=>{try{expressionManager.setValue(v,0);}catch(e){}});
    if(visemeActive){visemeTimer+=dt;try{expressionManager.setValue(currentViseme,Math.abs(Math.sin(visemeTimer*12))*0.8);}catch(e){}}
    if(Math.random()<0.003&&!window._blinking){
      window._blinking=true;const t0=Date.now();
      const blink=()=>{const e=Date.now()-t0;if(e>180){try{expressionManager.setValue('blink',0);}catch(e){}window._blinking=false;return;}const v=e<80?e/80:Math.max(0,1-(e-80)/100);try{expressionManager.setValue('blink',v);}catch(e){}requestAnimationFrame(blink);};
      blink();
    }
  }
  vrm.update(dt);
}
function renderLoop(){requestAnimationFrame(renderLoop);updateVRM(clock.getDelta());renderer.render(scene,camera);}

let detector=null;
const moves={left:false,right:false,both:false};
const holdCount={left:0,right:0,both:0};
const smooth={};

async function initDetector(){
  await tf.setBackend('webgl');await tf.ready();
  detector=await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet,{modelType:poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING});
}

function smoothKp(key,kp){
  if(!smooth[key])smooth[key]={x:kp.x,y:kp.y,score:kp.score};
  const a=0.7;smooth[key].x=smooth[key].x*a+kp.x*(1-a);smooth[key].y=smooth[key].y*a+kp.y*(1-a);smooth[key].score=kp.score;
  return smooth[key];
}

async function poseLoop(){
  const v=document.getElementById('webcam');
  if(!detector||!v||v.readyState<2){requestAnimationFrame(poseLoop);return;}
  try{const p=await detector.estimatePoses(v,{flipHorizontal:false});if(p.length>0)analyzePose(p[0].keypoints);}catch(e){}
  requestAnimationFrame(poseLoop);
}

function analyzePose(kps){
  const g=n=>kps.find(k=>k.name===n);
  const ls=g('left_shoulder'),rs=g('right_shoulder'),lw=g('left_wrist'),rw=g('right_wrist');
  if(!ls||!rs||!lw||!rw)return;
  const sLs=smoothKp('ls',ls),sRs=smoothKp('rs',rs),sLw=smoothKp('lw',lw),sRw=smoothKp('rw',rw);
  const MIN=0.3,scale=Math.max(Math.abs(sLs.x-sRs.x),60),thr=scale*0.24;
  const lUp=sLw.score>MIN&&(sLs.y-sLw.y)>thr,rUp=sRw.score>MIN&&(sRs.y-sRw.y)>thr;
  const hold=(raw,key)=>{holdCount[key]=raw?Math.min(holdCount[key]+1,10):Math.max(holdCount[key]-1,0);return holdCount[key]>=2;};
  moves.left=hold(lUp&&!rUp,'left');moves.right=hold(rUp&&!lUp,'right');moves.both=lUp&&rUp;
  const sp=(id,lbl,on)=>{const el=document.getElementById(id);if(!el)return;el.classList.toggle('on',on);el.textContent=lbl+(on?' ON':' --');};
  sp('p-left','L arm',moves.left);sp('p-right','R arm',moves.right);sp('p-both','BOTH',moves.both);
}

function checkAction(a){return a==='left'?moves.left:a==='right'?moves.right:a==='both'?moves.both:false;}

function showCue(emoji,label,instr,isLive,ms){
  const c=document.getElementById('action-cue');
  document.getElementById('cue-emoji').textContent=emoji;
  document.getElementById('cue-label').textContent=label;
  document.getElementById('cue-instr').textContent=instr;
  c.classList.add('show');
  if(isLive){c.classList.add('live');const tf=document.getElementById('cue-timer-fill');tf.style.animation='none';void tf.offsetWidth;tf.style.animation='timerShrink '+ms+'ms linear forwards';}
  else c.classList.remove('live');
}
function hideCue(){document.getElementById('action-cue').classList.remove('show','live');}
function flashFeedback(t){const f=document.getElementById('feedback');f.className=t;setTimeout(()=>f.className='',600);}
function showScorePop(pts,color){const el=document.getElementById('score-pop');el.textContent='+'+pts;el.style.color=color||'#ffd700';el.classList.remove('show');void el.offsetWidth;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),900);}
function setGreenFlash(on){document.getElementById('green-flash').classList.toggle('show',on);document.body.classList.toggle('window-open',on);}
function speak(text){
  try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=1.0;u.pitch=1.2;
    const voices=speechSynthesis.getVoices().filter(v=>v.lang.startsWith('en'));
    const pref=voices.find(v=>/Samantha|Karen|Google.*Female|Zira/i.test(v.name))||voices[0];if(pref)u.voice=pref;
    visemeActive=true;currentViseme='aa';visemeTimer=0;u.onend=()=>{visemeActive=false;};speechSynthesis.speak(u);}catch(e){}
}

function startSong(){
  timelineIdx=0;
  const audio=new Audio('hello.mp3');audio.volume=0.85;window._songAudio=audio;
  audio.play().catch(()=>{});
  audio.onended=()=>setTimeout(endGame,1000);
  setNovaPose('hype',1800);
  songTimer=setInterval(()=>{
    const elapsed=window._songAudio&&!window._songAudio.paused?window._songAudio.currentTime*1000:0;
    document.getElementById('progress-fill').style.width=Math.min(100,(elapsed/SONG_DURATION)*100)+'%';
    while(timelineIdx<TIMELINE.length&&elapsed>=TIMELINE[timelineIdx].t){
      const e=TIMELINE[timelineIdx];
      if(e.type==='lyric')showLyric(e.text);
      else if(e.type==='helloL'){showLyric(e.lyric||'Hello,');novaHelloArm('L');}
      else if(e.type==='helloR'){showLyric(e.lyric||'hello.');novaHelloArm('R');}
      else if(e.type==='demo'){setNovaPose(e.action,2400);showCue(e.emoji,e.label,e.instr,false,0);}
      else if(e.type==='open'){
        currentAction=e;actionDetected=false;actionWindow=true;actionStartTime=Date.now();attempts++;
        let wMs=2500;for(let j=timelineIdx+1;j<TIMELINE.length;j++){if(TIMELINE[j].type==='close'&&TIMELINE[j].action===e.action){wMs=TIMELINE[j].t-e.t;break;}}
        setGreenFlash(true);showCue(e.emoji,e.label,e.instr,true,wMs);setNovaPose(e.action,wMs);
        let el2=0;const chk=setInterval(()=>{el2+=80;if(!actionWindow||actionDetected||el2>wMs+200){clearInterval(chk);return;}
          if(checkAction(e.action)){actionDetected=true;clearInterval(chk);
            const rm=Date.now()-actionStartTime,isGreat=rm<1000,pts=isGreat?Math.round(e.pts*1.5):e.pts;
            score+=pts;hits++;combo++;maxCombo=Math.max(maxCombo,combo);
            document.getElementById('score-display').textContent=score+' pts';
            flashFeedback('hit');showScorePop(pts,isGreat?'#ffd700':'#00ff99');
            setNovaPose('hype',1000);speak(isGreat?'Great!':'Yes!');}
        },80);
      }
      else if(e.type==='close'){setGreenFlash(false);hideCue();if(!actionDetected&&actionWindow){combo=0;flashFeedback('miss');}actionWindow=false;}
      timelineIdx++;
    }
  },80);
}

function endGame(){
  clearInterval(songTimer);setGreenFlash(false);
  if(window._songAudio)window._songAudio.pause();
  setNovaPose('hype',99999);
  const rate=attempts>0?hits/attempts:0,stars=rate>=0.9?5:rate>=0.7?4:rate>=0.5?3:rate>=0.3?2:1;
  document.getElementById('end-title').textContent=['Keep trying!','Good job!','Great!','Amazing!','PERFECT!'][stars-1];
  document.getElementById('end-stars').textContent='*'.repeat(stars);
  document.getElementById('end-score').textContent=score+' pts';
  document.getElementById('end-detail').textContent=hits+' of '+attempts+' moves. Best combo: '+maxCombo;
  document.getElementById('end-screen').style.display='flex';
  speak('Amazing! You hit '+hits+' out of '+attempts+' moves!');
}

window.restartGame=function(){
  score=0;hits=0;attempts=0;combo=0;maxCombo=0;
  document.getElementById('score-display').textContent='0 pts';
  document.getElementById('progress-fill').style.width='0%';
  document.getElementById('end-screen').style.display='none';
  startSong();
};

window.beginGame=async function(){
  document.getElementById('start-screen').style.display='none';
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:1280},height:{ideal:720},facingMode:'user'},audio:false});
    const v=document.getElementById('webcam');v.srcObject=stream;
    await new Promise(r=>v.onloadedmetadata=r);await v.play();
  }catch(e){alert('Camera needed: '+e.message);return;}
  try{await initDetector();}catch(e){console.log('No pose detection:',e);}
  poseLoop();
  speechSynthesis.getVoices();
  speak("Let's dance with Nova! Watch me then copy!");
  setTimeout(startSong,2500);
};

window.addEventListener('load',async()=>{
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();
  resizeRenderer();
  try{await loadVRM();console.log('VRM loaded');}
  catch(e){console.error('VRM failed:',e.message);}
  renderLoop();
});
</script>
</body>
</html>
