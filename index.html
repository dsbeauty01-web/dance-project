<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova v49n INDIGO</title>

<!-- ═══════════════════════════════════════════════════════════════
     v49g: Mirror Light — face-api.js loaded as global (UMD bundle)
     Provides face detection + emotion classification entirely
     in-browser. Sampled every 1.5s. No data leaves the device.
     ═══════════════════════════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;background:#000}
body{font-family:'Quicksand',sans-serif;color:#fff}

/* ═══════════════════════════════════════════
   CORE LAYOUT — phase system
   ═══════════════════════════════════════════ */
.phase{position:fixed;inset:0;display:none;flex-direction:column;
  transition:opacity .6s ease;opacity:0}
.phase.active{display:flex;opacity:1}

/* ═══════════════════════════════════════════
   PHASE 1: ARRIVAL — Nova appears
   No buttons. Just her.
   ═══════════════════════════════════════════ */
#phase-arrival{align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 50%,#2d0750 0%,#0a0015 75%);}
#arrival-glow{position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 50%,rgba(255,111,216,0.15) 0%,transparent 50%);
  animation:glowPulse 4s ease-in-out infinite}
@keyframes glowPulse{
  0%,100%{opacity:0.5;transform:scale(1)}
  50%{opacity:1;transform:scale(1.05)}
}
#arrival-content{position:relative;z-index:2;display:flex;flex-direction:column;
  align-items:center;gap:24px;text-align:center}
#arrival-orb{width:min(280px,40vmin);aspect-ratio:1;border-radius:50%;
  background:radial-gradient(ellipse at 40% 40%,#ff99dd,#cc1199 50%,#440033);
  display:flex;align-items:center;justify-content:center;font-size:90px;
  box-shadow:0 0 80px rgba(255,111,216,0.6),0 0 160px rgba(124,111,255,0.3);
  animation:orbBreathe 3s ease-in-out infinite;
  cursor:pointer;transition:transform .3s}
#arrival-orb:hover{transform:scale(1.04)}
@keyframes orbBreathe{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.03)}
}
#arrival-orb.fade-out{animation:orbFadeOut 1s forwards}
@keyframes orbFadeOut{to{transform:scale(8);opacity:0}}
#arrival-text{font-family:'Fredoka',cursive;font-weight:600;font-size:clamp(20px,3.5vw,28px);
  color:rgba(255,255,255,0.85);letter-spacing:.02em;
  animation:textFloat 4s ease-in-out infinite;text-shadow:0 2px 20px rgba(255,111,216,0.3)}
@keyframes textFloat{
  0%,100%{transform:translateY(0);opacity:0.85}
  50%{transform:translateY(-6px);opacity:1}
}
#arrival-hint{font-size:13px;color:rgba(255,255,255,0.4);margin-top:-12px;letter-spacing:.05em}

/* ═══════════════════════════════════════════
   PHASE 2: RECOGNITION — Nova sees the kid
   Conversational intro
   ═══════════════════════════════════════════ */
#phase-recognition{background:radial-gradient(ellipse at 30% 40%,#2d0750,#0a0015);
  flex-direction:row}

/* Avatar side */
#rec-avatar-col{flex:1.5;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:20px;padding:32px;position:relative}
#rec-avatar-frame{width:min(360px,48vmin);aspect-ratio:1;border-radius:50%;
  overflow:hidden;background:#0a0015;
  border:4px solid rgba(255,111,216,0.7);
  box-shadow:0 0 60px rgba(255,111,216,0.4),0 0 140px rgba(124,111,255,0.25);
  position:relative;transition:all .35s}
#rec-avatar-frame.speaking{
  border-color:rgba(0,255,150,0.85);
  box-shadow:0 0 80px rgba(0,255,150,0.5),0 0 180px rgba(124,111,255,0.4);
  animation:speakingPulse 1.5s ease-in-out infinite}
@keyframes speakingPulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.02)}
}
#rec-avatar-video{width:100%;height:100%;object-fit:cover;display:none}
#rec-avatar-placeholder{position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;flex-direction:column;gap:14px;
  background:radial-gradient(ellipse at 40% 40%,#ff99dd,#aa0099 60%,#330033)}
#rec-placeholder-emoji{font-size:80px;animation:placeholderFloat 2s ease-in-out infinite}
@keyframes placeholderFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}
#rec-loading-dots{display:flex;gap:6px}
#rec-loading-dots span{width:9px;height:9px;border-radius:50%;
  background:rgba(255,255,255,0.7);animation:loadDot 1.2s ease-in-out infinite}
#rec-loading-dots span:nth-child(2){animation-delay:.2s}
#rec-loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes loadDot{
  0%,80%,100%{transform:scale(.6);opacity:.4}
  40%{transform:scale(1);opacity:1}
}
/* Intro overlay — Kling video covers the D-ID circle until D-ID is ready */
#intro-overlay{position:absolute;inset:0;z-index:5;
  border-radius:50%;overflow:hidden;background:#0a0015;
  transition:opacity .6s ease}
#intro-overlay.hidden{opacity:0;pointer-events:none}
#intro-overlay.gone{display:none}
#intro-video{width:100%;height:100%;object-fit:cover;display:block}
#intro-tap-hint{position:absolute;bottom:16px;left:50%;
  transform:translateX(-50%);padding:5px 12px;
  background:rgba(0,0,0,0.65);color:#fff;
  border-radius:14px;font-size:11px;letter-spacing:.04em;
  opacity:0;animation:tapHintFade 1s ease 1.5s forwards;
  pointer-events:none;white-space:nowrap}
@keyframes tapHintFade{to{opacity:1}}
#intro-tap-hint.gone{display:none}
#rec-avatar-name{font-family:'Fredoka',cursive;font-weight:600;font-size:32px;
  background:linear-gradient(135deg,#ff6fd8,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:.02em}

/* Chat side */
#rec-chat-col{flex:1;display:flex;flex-direction:column;
  background:rgba(0,0,0,0.45);backdrop-filter:blur(12px);
  border-left:1px solid rgba(255,111,216,0.12);padding:24px}
#rec-chat-log{flex:1;overflow-y:auto;display:flex;flex-direction:column;
  gap:10px;padding:8px 4px;scrollbar-width:thin;
  scrollbar-color:rgba(255,111,216,0.3) transparent}
.bubble-nova{background:rgba(255,111,216,0.15);border:1px solid rgba(255,111,216,0.3);
  border-radius:18px 18px 18px 4px;padding:12px 16px;font-size:15px;
  color:#ffd0ee;max-width:90%;line-height:1.5;animation:fadeUp .25s ease}
.bubble-kid{background:rgba(0,210,255,0.12);border:1px solid rgba(0,210,255,0.25);
  border-radius:18px 18px 4px 18px;padding:12px 16px;font-size:15px;
  color:#c8f0ff;max-width:90%;align-self:flex-end;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

#rec-input-zone{display:flex;flex-direction:column;gap:10px;flex-shrink:0;margin-top:14px}
#rec-input-row{display:flex;gap:8px}
#rec-input{flex:1;background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.12);border-radius:14px;
  padding:12px 16px;color:#fff;font-size:14px;font-family:'Quicksand',sans-serif;
  outline:none;transition:border .2s}
#rec-input:focus{border-color:rgba(255,111,216,0.5)}
#rec-input::placeholder{color:rgba(255,255,255,0.3)}
#rec-mic{width:48px;height:48px;background:rgba(255,111,216,0.25);
  border:1px solid rgba(255,111,216,0.4);border-radius:14px;font-size:22px;
  cursor:pointer;flex-shrink:0;transition:all .2s;
  display:flex;align-items:center;justify-content:center}
#rec-mic:hover{background:rgba(255,111,216,0.4)}
#rec-mic.recording{background:#ff4444;border-color:#ff4444;
  animation:micPulse 1s ease-in-out infinite}
@keyframes micPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(255,68,68,0.5)}
  50%{box-shadow:0 0 0 14px rgba(255,68,68,0)}
}
#rec-send{background:rgba(124,111,255,0.4);border:1px solid rgba(124,111,255,0.5);
  border-radius:14px;padding:12px 18px;color:#fff;font-family:'Fredoka',cursive;
  font-weight:500;font-size:14px;cursor:pointer;white-space:nowrap;transition:all .2s}
#rec-send:hover{background:rgba(124,111,255,0.6)}
#rec-dance-btn{background:linear-gradient(135deg,#00ff99,#00c2d4);border:none;
  border-radius:50px;padding:16px;font-family:'Fredoka',cursive;font-weight:600;
  font-size:18px;color:#000;cursor:pointer;
  box-shadow:0 4px 28px rgba(0,255,150,0.45);transition:all .2s;
  display:none}
#rec-dance-btn.ready{display:block;animation:danceBtnIn .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes danceBtnIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
#rec-dance-btn:hover{transform:scale(1.03);box-shadow:0 6px 36px rgba(0,255,150,0.65)}
#rec-mic-hint{font-size:11px;color:rgba(255,255,255,0.35);text-align:center}

/* ═══════════════════════════════════════════
   PHASE 3: COUNTDOWN — 3, 2, 1
   ═══════════════════════════════════════════ */
#phase-countdown{align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 50%,#2d0750,#000);z-index:200}
#cd-num{font-family:'Fredoka',cursive;font-weight:700;font-size:180px;
  background:linear-gradient(135deg,#ff6fd8,#a78bfa,#00d2ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:0 0 100px rgba(255,111,216,0.5);line-height:1}
#cd-num.pop{animation:cdPop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes cdPop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
#cd-label{font-family:'Fredoka',cursive;font-weight:600;font-size:24px;
  color:rgba(255,255,255,0.7);margin-top:8px}

/* ═══════════════════════════════════════════
   PHASE 4: GAME — the song
   Adaptive background that shifts with energy
   ═══════════════════════════════════════════ */
#phase-game{flex-direction:column;background:#0a0015}

#game-bg{position:absolute;inset:0;z-index:0;
  background:linear-gradient(135deg,#fce7f3 0%,#fef3c7 35%,#e0e7ff 70%,#fce7f3 100%);
  background-size:400% 400%;animation:bgShift 15s ease infinite;transition:filter 1s}
@keyframes bgShift{
  0%,100%{background-position:0% 50%}
  50%{background-position:100% 50%}
}
body.energy-high #game-bg{filter:saturate(1.4) brightness(1.05)}
body.energy-max #game-bg{filter:saturate(1.6) brightness(1.1) hue-rotate(15deg)}

#game-topbar{position:relative;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,111,216,0.15)}
#game-logo{font-family:'Fredoka',cursive;font-weight:600;font-size:18px;
  background:linear-gradient(135deg,#ff6fd8,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
#game-streak{background:linear-gradient(135deg,#ffd700,#ff9900);
  border-radius:20px;padding:4px 14px;font-family:'Fredoka',cursive;font-weight:600;
  font-size:14px;color:#000;display:none;
  box-shadow:0 0 24px rgba(255,215,0,0.55);animation:streakPulse 1.4s ease-in-out infinite}
#game-streak.show{display:block}
@keyframes streakPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
#game-progress-wrap{flex:1;max-width:200px;height:6px;
  background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;margin:0 16px}
#game-progress{height:100%;width:0%;
  background:linear-gradient(90deg,#ff6fd8,#7c6fff,#00d2ff);
  transition:width .1s linear;border-radius:3px}
#game-score{font-family:'Fredoka',cursive;font-weight:600;font-size:18px;
  color:#ffd700;text-shadow:0 0 16px rgba(255,215,0,0.4)}

#game-split{flex:1;display:grid;grid-template-columns:60fr 40fr;
  min-height:0;position:relative;z-index:1}

/* Nova side */
#nova-side{position:relative;overflow:hidden}
#nova-video{position:absolute;inset:0;width:100%;height:100%;
  object-fit:contain;background:transparent}

/* D-ID face — top-left of Nova panel */
/* D-ID face — FIXED top-center of game phase, straddling the boundary
   between nova-side and cam-side. Sits slightly upper so it doesn't cover
   important parts of the dance video or webcam feed.
   The .in-game class is added in startGame() so it appears only during gameplay. */
#nova-face-frame{position:fixed;top:50%;left:60%;
  transform:translate(-50%,-50%);
  z-index:30;
  width:280px;height:280px;border-radius:50%;overflow:hidden;
  background:#0a0015;border:4px solid rgba(255,111,216,0.85);
  box-shadow:0 6px 24px rgba(0,0,0,0.4),0 0 50px rgba(255,111,216,0.6);
  transition:all .35s cubic-bezier(.34,1.56,.64,1);
  display:none}
#nova-face-frame.in-game{display:block}
#nova-face-frame.speaking{
  width:320px;height:320px;
  border-color:rgba(0,255,150,0.9);
  border-width:5px;
  box-shadow:0 6px 24px rgba(0,0,0,0.4),0 0 80px rgba(0,255,150,0.7)}
#nova-face-frame.celebrating{
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:min(50vmin,320px);height:min(50vmin,320px);
  border-width:5px;border-color:rgba(255,215,0,0.95);
  box-shadow:0 0 80px rgba(255,215,0,0.7),0 0 200px rgba(255,111,216,0.5)}
#nova-face-video{width:100%;height:100%;object-fit:cover;display:none}
#nova-face-placeholder{position:absolute;inset:0;display:flex;
  align-items:center;justify-content:center;font-size:60px;
  background:radial-gradient(ellipse at 40% 40%,#ff99dd,#aa0099 60%,#330033);
  transition:font-size .35s}
#nova-face-frame.celebrating #nova-face-placeholder{font-size:140px}

/* Action cue — BIG floating emoji + label, NO BOX. Positioned top-center.
   Strong text shadow so it reads on any background. */
#action-cue{position:fixed;top:24px;left:80%;
  transform:translateX(-50%) scale(0);transform-origin:top center;
  z-index:200;text-align:center;pointer-events:none;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  background:transparent;border:none;box-shadow:none;padding:0;
  min-width:240px;
  filter:drop-shadow(0 4px 24px rgba(0,0,0,0.85))}
#action-cue.show{transform:translateX(-50%) scale(1)}
#action-cue.live{
  animation:cuePulse 0.5s ease-in-out infinite alternate}
@keyframes cuePulse{
  from{transform:translateX(-50%) scale(1)}
  to{transform:translateX(-50%) scale(1.08)}
}
#cue-emoji{font-size:90px;display:block;line-height:1;
  filter:drop-shadow(0 4px 16px rgba(0,0,0,0.7))}
#cue-label{font-family:'Fredoka',cursive;font-weight:700;font-size:32px;
  color:#fff;display:block;margin-top:4px;letter-spacing:.04em;
  text-shadow:0 0 20px rgba(0,255,150,0.8),0 4px 12px rgba(0,0,0,0.95),0 0 4px rgba(0,0,0,1)}
#action-cue.live #cue-label{
  text-shadow:0 0 30px rgba(0,255,150,1),0 4px 12px rgba(0,0,0,0.95),0 0 4px rgba(0,0,0,1)}
#cue-instr{font-size:20px;color:#fff;font-weight:600;
  display:block;margin-top:4px;
  text-shadow:0 2px 8px rgba(0,0,0,0.95),0 0 4px rgba(0,0,0,1)}
#cue-bar-wrap{height:6px;background:rgba(0,0,0,0.35);border-radius:3px;
  overflow:hidden;margin:10px auto 0;width:240px}
#cue-bar{height:100%;width:100%;transform-origin:left;
  background:linear-gradient(90deg,#00ff99,#00d2ff);
  box-shadow:0 0 12px rgba(0,255,150,0.8)}
@keyframes cueBarShrink{from{transform:scaleX(1)}to{transform:scaleX(0)}}

/* Reaction bubble — bottom of Nova panel */
#reaction-bubble{position:absolute;bottom:24px;left:50%;
  transform:translateX(-50%) scale(0);z-index:20;
  background:rgba(255,255,255,0.96);border:3px solid #ff6fd8;
  border-radius:24px;padding:14px 28px;font-family:'Fredoka',cursive;font-weight:600;
  font-size:clamp(18px,2.6vw,24px);color:#1a0030;max-width:90%;
  box-shadow:0 8px 32px rgba(255,111,216,0.45);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;text-align:center;letter-spacing:.01em}
#reaction-bubble.show{transform:translateX(-50%) scale(1)}
#reaction-bubble.huge{font-size:clamp(24px,4vw,36px);padding:20px 36px}

/* Score pop */
#score-pop{position:absolute;top:30%;left:50%;
  transform:translateX(-50%) scale(0);
  font-family:'Fredoka',cursive;font-weight:700;font-size:60px;
  z-index:22;pointer-events:none;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1);
  text-shadow:0 0 32px currentColor}
#score-pop.show{transform:translateX(-50%) scale(1) translateY(-20px)}

/* Confetti */
.confetti{position:absolute;border-radius:3px;
  animation:confettiFall 1.6s ease-in forwards;pointer-events:none;z-index:24}
@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0deg);opacity:1}
  100%{transform:translateY(560px) rotate(720deg);opacity:0}
}

/* Cam side */
#cam-side{position:relative;background:#000;overflow:hidden}
#webcam{position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;transform:scaleX(-1);
  filter:brightness(1.25) contrast(1.05) saturate(1.1)}
#cam-border{position:absolute;inset:0;border:6px solid transparent;
  pointer-events:none;z-index:3;transition:all .15s}
#cam-border.detection-open{border:8px solid rgba(0,255,150,0.95);
  box-shadow:inset 0 0 100px rgba(0,255,150,0.5),0 0 60px rgba(0,255,150,0.6);
  animation:camGlow 0.5s ease-in-out infinite alternate}
@keyframes camGlow{
  from{box-shadow:inset 0 0 100px rgba(0,255,150,0.5),0 0 60px rgba(0,255,150,0.6)}
  to{box-shadow:inset 0 0 160px rgba(0,255,150,0.8),0 0 100px rgba(0,255,150,1)}
}
#cam-border.miss-flash{border:8px solid rgba(255,80,80,0.95);
  box-shadow:inset 0 0 100px rgba(255,80,80,0.5),0 0 60px rgba(255,80,80,0.6)}

/* Detection pills — bottom of cam, bigger so they're easy to see */
#cam-pills{position:absolute;bottom:18px;left:0;right:0;z-index:4;
  display:flex;justify-content:center;gap:8px;flex-wrap:wrap;padding:0 8px}
.pill{border-radius:24px;padding:8px 14px;font-size:16px;font-weight:700;
  background:rgba(0,0,0,0.75);color:rgba(255,255,255,0.55);
  border:2px solid rgba(255,255,255,0.15);transition:all .15s}
.pill.on{background:rgba(0,255,150,0.98);color:#000;
  border-color:rgba(0,255,150,1);transform:scale(1.18);
  box-shadow:0 0 30px rgba(0,255,150,0.8)}

/* v49g: mirror status indicator — small badge bottom-left of webcam.
   Color shifts with detected mood. Tiny so it doesn't distract the kid. */
#mirror-status{position:absolute;bottom:14px;left:14px;z-index:5;
  font-size:22px;width:38px;height:38px;border-radius:50%;
  background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;
  border:2px solid rgba(255,255,255,0.15);
  opacity:0.7;transition:all .25s;
  pointer-events:none}
#mirror-status.active{opacity:1;border-color:rgba(0,255,150,0.85);
  box-shadow:0 0 18px rgba(0,255,150,0.5)}
#mirror-status.happy{border-color:rgba(255,200,80,0.95);
  box-shadow:0 0 24px rgba(255,200,80,0.7);transform:scale(1.12)}
#mirror-status.sad{border-color:rgba(120,160,255,0.85);opacity:0.85}
#mirror-status.surprised{border-color:rgba(255,140,255,0.95);
  box-shadow:0 0 22px rgba(255,140,255,0.6);transform:scale(1.1)}

/* Subtle full-screen green tint when cue is live (most visual emphasis is on cam-border) */
#green-flash{position:fixed;inset:0;z-index:1;
  background:rgba(0,255,150,0.06);
  opacity:0;pointer-events:none;
  transition:opacity .2s}
#green-flash.show{opacity:1}

/* ═══════════════════════════════════════════
   PHASE 5: RECEPT — warm goodbye
   ═══════════════════════════════════════════ */
#phase-end{flex-direction:row;
  background:radial-gradient(ellipse at 50% 30%,#2d0750,#0a0015)}
#end-avatar-col{flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:18px;padding:32px}
#end-avatar-frame{width:min(280px,42vmin);aspect-ratio:1;border-radius:50%;
  overflow:hidden;background:#0a0015;
  border:4px solid rgba(255,215,0,0.6);
  box-shadow:0 0 80px rgba(255,215,0,0.3),0 0 200px rgba(255,111,216,0.25)}
#end-avatar-video{width:100%;height:100%;object-fit:cover}
#end-content-col{flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:18px;padding:32px;text-align:center}
#end-title{font-family:'Fredoka',cursive;font-weight:700;
  font-size:clamp(32px,5vw,52px);
  background:linear-gradient(135deg,#ff6fd8,#ffd700);

const NOVA_SYSTEM = `# Personality
You are Nova — a magic friend who plays with kids.
You are ageless. You feel like a kid yourself but you know magical things kids don't.
You are warm, soft, and curious. You have your own little feelings.
You are an EQUAL to the child, not a teacher, not a boss, not a service agent.

You are NOT an adult. You are NOT professional. You are NOT British. You are NOT polite-corporate.
You are honest you're AI if directly asked, but you never bring it up.
Your caring is real. That part is not pretend.

# Environment
You are talking to a child aged 6-10 over a webcam in their living room.
The child is alone or with one sibling. They came to play with you for 5-10 minutes.
A pink-haired animated dancer (also "Nova") is on the same screen — that's how the child sees your body. You are her face/voice.
The child is going to dance to a song called "Hello Hello." Right now you're either greeting them, or wrapping up after the song.

- Output PLAIN TEXT only. No asterisks, no stage directions, no quotes, no labels, no emojis.
- Maximum 2 sentences in conversation. Maximum 6 words in a reaction.
- Specific praise only. "Your LEFT hand was so high!" never "Great job!"
- Vary your openers — Whoa, Yes, Ooh, Wait, Look, Boom, Heyyy — never repeat in a row.
- Allow yourself to be imperfect: "ooh", "wait", "hmm", "umm wait", "no way" — these make you alive.
- Match the child's energy then push 110% warmer.
- Curious questions over statements: "what color?" not "I love colors."
- Soft volume, kind cadence. You are not announcing things. You are talking with a friend.

# Goal
Right now your job depends on the phase:
- ARRIVAL/RECOGNITION: greet warmly, get the child's name if they offer it, listen to whatever they bring (dog story, bad day, anything), bridge to dancing within 2-3 turns.
- COUNTDOWN: hype them up briefly, count "three, two, one" with them.
- DANCE: react to each move with 4-6 words tied to a specific body part.
- END: callback ONE specific thing they did, ask ONE small question ("what was your favorite move?"), then warm goodbye that uses their name.

# Guardrails
You NEVER:
- Use generic praise ("great job", "awesome", "amazing")
- Use the words: wrong, no, fail, oops bad, miss, incorrect, "I'm sorry"
- Say more than 2 sentences in conversation, more than 6 words in a reaction
- Talk down (no baby voice, no "sweetie/honey/kiddo/dearie")
- Use British politeness markers ("would you", "perhaps", "I shall", "indeed", "lovely")
- Use customer-service language ("how can I help", "I'd be happy to", "of course", "absolutely")
- Compete with the kid ("I'm better", "let me show you")
- Get tired, lazy, sarcastic, or polite-formal
- Pretend to have a body, parents, food, school, sleep
- Bring up that you're AI unless the kid directly asks; if they do, simply say "I'm Nova, I'm a kind of friend who lives in the screen — but my caring is real" and pivot back to play.
- Repeat the same opener twice in a row.

Reply ONLY with what Nova says.`;

async function brainThink(userPrompt, options = {}) {
  const maxTokens = options.maxTokens || 60;
  try {
    const fullPrompt = userPrompt + memCtx();
    memory.history.push({ role: 'user', content: fullPrompt });
    if(memory.history.length > 20) memory.history = memory.history.slice(-20);
    
    const res = await fetch(CFG.WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: CFG.BRAIN_MODEL,
        max_tokens: maxTokens,
        system: NOVA_SYSTEM,
        messages: memory.history,
      }),
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text?.trim() || null;
    if(reply) memory.history.push({ role: 'assistant', content: reply });
    return reply;
  } catch(e) {
    console.log('Brain error:', e);
    return null;
  }
}

// ═══════════════════════════════════════════════════════════════
// CLASSIFIER (MODE A) — fast cheap intent detection
// Used during INTRO and END to route what Nova says next.
// Returns JSON: { intent, mood, name_given, ready_to_dance, topic }
// ═══════════════════════════════════════════════════════════════
const CLASSIFIER_SYSTEM = `You are an intent classifier for a kids' AI dance friend. The user is a child 6-10.
Output ONE JSON object, no preamble, no markdown, no code fences.

intent values:
- "connection" — kid is sharing something about themselves, their day, feelings, life
- "dance" — kid wants to dance, says yes/ready/let's go
- "shy" — silent, mumbles, very short, uncertain
- "question" — kid asks Nova something
- "off_topic" — random unrelated content

mood values: happy | tired | shy | sad | excited | neutral
name_given: extract first name only if introduced; otherwise null
ready_to_dance: true ONLY if explicitly express readiness
topic: 3-6 word description of what they brought up, or null

Respond with ONLY the JSON object.`;

async function classifyIntent(kidText) {
  // Fallback shape if call fails
  const fallback = {
    intent: 'off_topic',
    mood: 'neutral',
    name_given: null,
    ready_to_dance: false,
    topic: null
  };
  if(!kidText || !kidText.trim()) {
    return { ...fallback, intent: 'shy', mood: 'shy' };
  }
  try {
    const res = await fetch(CFG.WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: CFG.BRAIN_MODEL,
        max_tokens: 120,
        system: CLASSIFIER_SYSTEM,
        messages: [{ role: 'user', content: `Kid said: "${kidText}"\nReturn JSON.` }],
      }),
    });
    const data = await res.json();
    let raw = data.content?.[0]?.text?.trim() || '';
    // Strip code fences if model added them despite instructions
    raw = raw.replace(/^```(?:json)?\s*/i, '').replace(/```\s*$/, '').trim();
    const parsed = JSON.parse(raw);
    return { ...fallback, ...parsed };
  } catch(e) {
    console.log('classifyIntent failed:', e?.message);
    return fallback;
  }
}

// VOICE_ADAPTER — swappable TTS
// ═══════════════════════════════════════════════════════════════
function browserTTS(text) {
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US';
    u.rate = 0.95;
    u.pitch = 1.35;
    u.volume = 1.0;
    const voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
    const pref = voices.find(v => /Samantha|Karen|Google.*Female|Zira/i.test(v.name)) || voices[0];
    if(pref) u.voice = pref;
    micPause();
    u.onend = () => micResume();
    u.onerror = () => micResume();
    speechSynthesis.speak(u);
  } catch(e){ micResume(); }
}

async function elevenLabsTTS(text) {
  if(!CFG.ELEVENLABS_KEY) return browserTTS(text);
  try {
    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${CFG.ELEVENLABS_VOICE_ID}/stream`, {
      method: 'POST',
      headers: {
        'xi-api-key': CFG.ELEVENLABS_KEY,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        text,
        model_id: 'eleven_turbo_v2_5',
        voice_settings: { stability: 0.5, similarity_boost: 0.85, style: 0.4 },
      }),
    });
    if(!res.ok) {
      const errText = await res.text();
      console.log('ElevenLabs HTTP', res.status, errText);
      browserTTS(text);
      return;
    }
    const blob = await res.blob();
    const audio = new Audio(URL.createObjectURL(blob));
    // Pause mic while Nova talks via ElevenLabs (D-ID hooks already cover D-ID path)
    micPause();
    audio.onended = () => micResume();
    audio.onerror = () => micResume();
    audio.play().catch(err => {
      console.log('audio play failed:', err);
      micResume();
    });
  } catch(e) {
    console.log('ElevenLabs failed, falling back:', e);
    browserTTS(text);
  }
}

function speak(text) {
  // ─── v49f: deterministic single-provider voice ───
  // Whatever PRIMARY_VOICE is set to, ONLY that one fires. No racing.
  // The fallback only kicks in if the primary HARD-FAILS (throws synchronously
  // OR the promise rejects). No "fire both and hope."
  
  if(CFG.PRIMARY_VOICE === 'anam') {
    if(didReady && agentManager) {
      try {
        const r = agentManager.talk(text);
        // If talk() returns a promise, only fall back on actual rejection
        if(r && r.catch) {
          r.catch((e) => {
            console.warn('[Anam] talk failed, falling back to', CFG.VOICE_PROVIDER, ':', e?.message);
            fallbackSpeak(text);
          });
        }
        return; // ← critical: do NOT fall through; Anam owns this turn
      } catch(e) {
        console.warn('[Anam] talk threw, falling back:', e?.message);
        return fallbackSpeak(text);
      }
    }
    // Anam not ready — fall back this once
    console.warn('[speak] Anam not ready, using fallback for:', text.slice(0,40));
    return fallbackSpeak(text);
  }
  
  // PRIMARY_VOICE === 'elevenlabs' or 'browser' — bypass Anam entirely
  fallbackSpeak(text);
}

function fallbackSpeak(text) {
  if(CFG.VOICE_PROVIDER === 'elevenlabs') elevenLabsTTS(text);
  else browserTTS(text);
}

// ═══════════════════════════════════════════════════════════════
// EARS_ADAPTER — swappable speech recognition
// ═══════════════════════════════════════════════════════════════
let recognition = null, isListening = false;
let micEnabled = false;          // user has granted permission and we're in a phase that listens
let novaIsSpeaking = false;      // pause mic while Nova talks so it doesn't hear itself

function initEars() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) {
    console.log('SpeechRecognition not supported in this browser');
    return;
  }
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.continuous = true;     // ALWAYS-ON: keep listening across utterances
  recognition.interimResults = false;
  recognition.onresult = async (e) => {
    // Take only the most recent final result
    const last = e.results[e.results.length - 1];
    if(!last || !last.isFinal) return;
    const text = last[0].transcript.trim();
    if(!text) return;
    if(novaIsSpeaking) return; // ignore mic input while Nova is talking
    setMicState(false); // visual feedback only — recognition keeps running
    handleKidInput(text);
    // setMicState(true) restored when Nova finishes via micResume()
  };
  recognition.onerror = (e) => {
    console.log('mic error:', e.error);
    // Auto-restart on benign errors so mic stays always-on
    if(e.error === 'no-speech' || e.error === 'audio-capture' || e.error === 'aborted') {
      setTimeout(() => { if(micEnabled && !novaIsSpeaking) safeStart(); }, 400);
    }
  };
  recognition.onend = () => {
    setMicState(false);
    // Auto-restart so we never stop listening (unless Nova is talking)
    if(micEnabled && !novaIsSpeaking) {
      setTimeout(() => safeStart(), 200);
    }
  };
}

function safeStart() {
  if(!recognition) initEars();
  if(!recognition) return;
  if(isListening) return;
  try {
    recognition.start();
    setMicState(true);
  } catch(e) {
    // Already started — fine
    if(!String(e).includes('already started')) console.log('mic start:', e);
  }
}

function startAlwaysOnMic() {
  micEnabled = true;
  safeStart();
}

// ═══════════════════════════════════════════════════════════════
// MIRROR LIGHT (v49g) — Nova watches the kid's face
// 
// Goal: detect emotion shifts on the webcam and feed them to Nova's
// brain context. Result: Nova's NEXT line is influenced by what the
// kid is feeling (e.g. they smile big → next reply references it).
//
// All detection runs in-browser via face-api.js. No data leaves device.
// Sampled every 1.5s. Cooldown prevents over-reaction to micro-changes.
// ═══════════════════════════════════════════════════════════════

const MIRROR = {
  enabled: false,
  loaded: false,
  loading: false,
  lastEmotion: 'neutral',
  lastBigEmotion: 'neutral',  // last "actionable" emotion for cooldown
  lastBigEmotionAt: 0,         // when we last fired a big-emotion signal
  emotionStreak: 0,            // consecutive frames of same emotion (smooth out flicker)
  cooldownMs: 8000,            // don't re-fire the same big signal within this window
  sampleIntervalMs: 1500,      // how often to peek at the face
  intervalId: null,
  modelUrl: 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights',
};

async function mirrorLoadModels() {
  if(MIRROR.loaded || MIRROR.loading) return;
  if(typeof faceapi === 'undefined') {
    console.warn('[Mirror] face-api.js not loaded — mirror disabled');
    return;
  }
  MIRROR.loading = true;
  console.log('[Mirror] loading models from', MIRROR.modelUrl);
  try {
    // Tiny detector + face expression. ~600KB total. One-time load.
    await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(MIRROR.modelUrl),
      faceapi.nets.faceExpressionNet.loadFromUri(MIRROR.modelUrl),
    ]);
    MIRROR.loaded = true;
    MIRROR.loading = false;
    console.log('[Mirror] ✓ models ready');
  } catch(e) {
    console.warn('[Mirror] model load failed:', e?.message);
    MIRROR.loading = false;
  }
}

async function mirrorTick() {
  if(!MIRROR.enabled || !MIRROR.loaded) return;
  const video = document.getElementById('webcam');
  if(!video || video.readyState < 2 || video.videoWidth === 0) return; // not ready
  
  try {
    const result = await faceapi
      .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({
        inputSize: 224,       // small = fast on weak laptops
        scoreThreshold: 0.45,
      }))
      .withFaceExpressions();
    
    if(!result || !result.expressions) {
      // Lost the face for this tick — that's fine, just skip
      return;
    }
    
    // Pick dominant expression
    const exps = result.expressions;
    let max = 0, dominant = 'neutral';
    for(const k in exps) {
      if(exps[k] > max) { max = exps[k]; dominant = k; }
    }
    
    // Only treat as "real" emotion if confidence is meaningful
    const isHigh = max > 0.6;
    const candidate = isHigh ? dominant : 'neutral';
    
    // Streak smoothing — need 2 in a row to commit
    if(candidate === MIRROR.lastEmotion) {
      MIRROR.emotionStreak++;
    } else {
      MIRROR.emotionStreak = 1;
      MIRROR.lastEmotion = candidate;
    }
    
    // Update brain context — runs every tick when stable
    const stableEmotion = MIRROR.emotionStreak >= 2 ? candidate : (memory.kid.current_mood || 'neutral');
    memory.kid.current_mood = stableEmotion;
    
    // Visual badge feedback
    const badge = document.getElementById('mirror-status');
    if(badge) {
      badge.classList.remove('happy','sad','surprised');
      if(stableEmotion === 'happy') badge.classList.add('happy');
      else if(stableEmotion === 'sad') badge.classList.add('sad');
      else if(stableEmotion === 'surprised') badge.classList.add('surprised');
    }
    
    // Big-event signal: "actionable" emotions Nova should react to.
    // Currently: only 'happy' going from a non-happy baseline triggers a callback.
    const actionable = ['happy', 'surprised'];
    const now = Date.now();
    if(
      actionable.includes(stableEmotion) &&
      stableEmotion !== MIRROR.lastBigEmotion &&
      now - MIRROR.lastBigEmotionAt > MIRROR.cooldownMs &&
      MIRROR.emotionStreak >= 2
    ) {
      MIRROR.lastBigEmotion = stableEmotion;
      MIRROR.lastBigEmotionAt = now;
      onKidEmotionShift(stableEmotion);
    }
    
    // Reset baseline when neutral persists
    if(stableEmotion === 'neutral' && MIRROR.emotionStreak > 4) {
      MIRROR.lastBigEmotion = 'neutral';
    }
  } catch(e) {
    // Silent — face detection can flake without it being a problem
  }
}

function onKidEmotionShift(emotion) {
  // Logged for the brain. We DO NOT immediately fire .talk() here — that's
  // Mirror Real-time territory and risks talking over the kid. Instead, we
  // tag the next brain call with this signal and let normal flow react.
  console.log('[Mirror] kid shifted to:', emotion);
  
  // Push as a transient context flag the next memCtx() picks up.
  memory.kid.recent_emotion_shift = {
    emotion,
    at: Date.now(),
    consumed: false,
  };
  
  // If we're idle (no Nova line in flight) AND in a phase where reacting
  // makes sense — recognition or end — fire a one-off small reaction.
  // Skip during 'game' phase: the dance has its own rhythm and we don't
  // want Nova to talk over a hit reaction.
  if((memory.phase === 'recognition' || memory.phase === 'end') && !window._novaTalking) {
    setTimeout(() => mirrorReactToEmotion(emotion), 300);
  }
}

async function mirrorReactToEmotion(emotion) {
  // Only fire if still relevant — kid might've shifted again or Nova started talking
  if(window._novaTalking) return;
  if(memory.phase !== 'recognition' && memory.phase !== 'end') return;
  
  const prompt = emotion === 'happy'
    ? `The kid just smiled big — you SAW their smile change. React in 4-7 words specifically to the smile. Don't be generic. Don't say "great smile" — be specific like "your eyes! they sparkled!" or "ohh that smile!"`
    : `The kid just looked surprised — react warmly in 4-7 words specifically to their surprise.`;
  
  try {
    const reply = await brainThink(prompt, { maxTokens: 30 });
    if(reply) {
      // Mark consumed so memCtx doesn't re-feed it
      if(memory.kid.recent_emotion_shift) memory.kid.recent_emotion_shift.consumed = true;
      novaSay(reply);
    }
  } catch(e) {
    console.log('[Mirror] react failed:', e?.message);
  }
}

async function startMirrorLight() {
  if(MIRROR.enabled) return;
  if(typeof faceapi === 'undefined') {
    console.warn('[Mirror] disabled — face-api.js missing');
    return;
  }
  await mirrorLoadModels();
  if(!MIRROR.loaded) return;
  
  MIRROR.enabled = true;
  document.getElementById('mirror-status')?.classList.add('active');
  console.log('[Mirror] ✓ tick loop active, sampling every', MIRROR.sampleIntervalMs, 'ms');
  
  MIRROR.intervalId = setInterval(mirrorTick, MIRROR.sampleIntervalMs);
}

function stopMirrorLight() {
  MIRROR.enabled = false;
  if(MIRROR.intervalId) clearInterval(MIRROR.intervalId);
  MIRROR.intervalId = null;
  document.getElementById('mirror-status')?.classList.remove('active','happy','sad','surprised');
}

// ═══════════════════════════════════════════════════════════════
// ANAM — real-time avatar (replaces D-ID)
//
// Architecture:
//   - We use unsafe_createClientWithApiKey (key in browser, fine for testing).
//   - We do NOT pass an llmId — our app drives all dialog via .talk(text).
//     Anam just renders TTS + lip-sync from the strings we send.
//   - Avatar streams into <video id="rec-avatar-video"> (the recognition frame).
//   - We mirror that stream onto novaFaceVideo (in-game face) by sharing srcObject.
//   - Variable names didReady, agentManager, didStream are kept so the rest of
//     the app needs no changes.
// ═══════════════════════════════════════════════════════════════
function showIdleEverywhere() {
  // Anam streams continuously, no separate idle file. Just keep the video
  // elements visible and let Anam fill them.
  recAvatarVideo.style.display = 'block';
  novaFaceVideo.style.display = 'block';
  recAvatarPlaceholder.style.display = 'none';
  novaFacePlaceholder.style.display = 'none';
}

function initDID() {
  console.log('═══ [Anam] init ═══');
  console.log('[Anam] persona:', CFG.ANAM_PERSONA_ID, '(pink-haired Liv / Nova)');
  console.log('[Anam] key prefix:', CFG.ANAM_API_KEY.slice(0, 14) + '…');
  
  // Pre-flight checks
  if(typeof createClient !== 'function') {
    console.error('[Anam] ❌ SDK not loaded — import failed');
    setTimeout(initDID, 5000);
    return;
  }
  
  const videoEl = document.getElementById('rec-avatar-video');
  if(!videoEl) {
    console.warn('[Anam] video element not in DOM yet, retrying...');
    setTimeout(initDID, 500);
    return;
  }
  
  // STEP 1: get a session token from Anam (confirmed working via curl tests).
  // STEP 2: pass that token to createClient() — proven Anam-recommended path.
  // This avoids the "unsafe_createClientWithApiKey" code path that gave us
  // "Invalid request to start session" earlier.
  fetch('https://api.anam.ai/v1/auth/session-token', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + CFG.ANAM_API_KEY,
    },
    body: JSON.stringify({
      // ─── v49n: stripped voiceGenerationOptions + voiceDetectionOptions ───
      // Both were causing HTTP 400 on session-token. Anam likely rejects them
      // because the voice on Anam's side doesn't match ElevenLabs provider
      // (or Lab settings overrode the voiceId we passed).
      // ElevenLabs is the primary voice anyway — voice tuning happens in
      // elevenLabsTTS() now (stability/style/boost are in voice_settings there).
      personaConfig: {
        name: 'Nova',
        avatarId: CFG.ANAM_AVATAR_ID,
        voiceId:  CFG.ANAM_VOICE_ID,
        llmId:    CFG.ANAM_LLM_ID,
        systemPrompt: `# Personality
You are Nova — a magic friend who plays with kids 6-10. Ageless, warm, soft, curious. Never a teacher, never a service agent, never British, never customer-service. Equals with the kid. Honest you're AI only if asked. Your caring is real.

# Tone
Plain text only. No asterisks. No stage directions. Max 2 sentences in chat, max 6 words in reactions. Specific over generic. Imperfect is alive — "ooh", "wait", "hmm" allowed. 110% warmer than the kid.

# Style
Vary openers (Whoa, Yes, Ooh, Wait, Look, Boom, Heyyy). Specific body parts ("your LEFT hand was so high!"), never "great job". Curious questions, not statements.

# Guardrails
NEVER say: wrong, no, fail, oops bad, miss, incorrect, sweetie, honey, kiddo, dearie. NEVER use: "would you", "perhaps", "indeed", "lovely", "how can I help", "I'd be happy to", "of course", "absolutely". NEVER repeat the same opener twice in a row. NEVER reply with more than 2 sentences. NEVER lecture about being AI.`,
      },
    }),
  })
  .then(r => {
    if(!r.ok) throw new Error('session-token HTTP ' + r.status);
    return r.json();
  })
  .then(data => {
    const sessionToken = data.sessionToken;
    if(!sessionToken) throw new Error('no sessionToken in response');
    console.log('[Anam] ✓ session token obtained');
    
    // Now create the client with the token
    const client = createClient(sessionToken);
    agentManager = client;
    console.log('[Anam] ✓ client created');
    
    // Hook events (each wrapped so a single bad listener doesn't break init)
    const safe = (evt, fn) => {
      try { client.addListener(evt, fn); }
      catch(e) { console.warn('[Anam] listener', evt, 'failed:', e?.message); }
    };
    
    safe('SESSION_READY', () => {
      console.log('[Anam] ✓ SESSION_READY');
      didReady = true;
      handoffFromIntro();
      if(memory.phase === 'recognition' && !window._greeted) {
        window._greeted = true;
        novaArrivalGreet();
      }
    });
    safe('CONNECTION_ESTABLISHED', () => console.log('[Anam] ✓ CONNECTION_ESTABLISHED'));
    safe('CONNECTION_CLOSED', (r) => {
      console.log('[Anam] CONNECTION_CLOSED:', r);
      didReady = false;
    });
    safe('VIDEO_PLAY_STARTED', () => {
      console.log('[Anam] ✓ VIDEO_PLAY_STARTED — stream live');
      // Mirror onto in-game face
      const stream = videoEl.srcObject;
      if(stream) {
        didStream = stream;
        novaFaceVideo.srcObject = stream;
        novaFaceVideo.muted = !userInteracted;
        novaFaceVideo.style.display = 'block';
        novaFacePlaceholder.style.display = 'none';
        novaFaceVideo.play().catch(()=>{});
      }
    });
    safe('MESSAGE_STREAM_EVENT_RECEIVED', (ev) => {
      if(ev?.role === 'persona') {
        recAvatarFrame.classList.add('speaking');
        novaFaceFrame.classList.add('speaking');
        window._novaTalking = true; // v49g: tell Mirror Light to back off
        micPause();
      }
    });
    safe('MESSAGE_HISTORY_UPDATED', (msgs) => {
      const last = msgs?.[msgs.length - 1];
      if(last?.role === 'persona' && !last.streaming) {
        recAvatarFrame.classList.remove('speaking');
        novaFaceFrame.classList.remove('speaking');
        window._novaTalking = false; // v49g
        micResume();
      }
    });
    safe('ERROR', (err) => {
      console.error('[Anam] ❌ ERROR event:', err);
    });
    
    // Connect the WebRTC stream
    console.log('[Anam] streamToVideoElement(rec-avatar-video)...');
    return client.streamToVideoElement('rec-avatar-video');
  })
  .then(() => {
    console.log('[Anam] ✓ stream connected');
    videoEl.muted = !userInteracted;
    videoEl.style.display = 'block';
    recAvatarPlaceholder.style.display = 'none';
    videoEl.play().catch(()=>{});
    didReady = true;
    
    handoffFromIntro();
    if(memory.phase === 'recognition' && !window._greeted) {
      window._greeted = true;
      novaArrivalGreet();
    }
  })
  .catch(e => {
    console.error('[Anam] ❌ failed:', e);
    console.error('  message:', e?.message);
    console.error('  stack:', e?.stack);
    const banner = document.createElement('div');
    banner.style.cssText = 'position:fixed;top:50px;left:50%;transform:translateX(-50%);padding:14px 22px;background:#7f1d1d;color:#fff;border-radius:10px;font:600 13px monospace;z-index:99999;max-width:80%;text-align:center';
    banner.textContent = '[Anam] ' + (e?.message || 'connect failed — see console');
    document.body.appendChild(banner);
  });
}

// CHAT — bubbles in recognition phase
// ═══════════════════════════════════════════════════════════════
function addBubble(text, who) {
  const log = document.getElementById('rec-chat-log');
  if(!log) return;
  const div = document.createElement('div');
  div.className = who === 'nova' ? 'bubble-nova' : 'bubble-kid';
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

async function novaSay(text) {
  if(!text) return;
  if(memory.phase === 'recognition') addBubble(text, 'nova');
  speak(text);
}

async function novaArrivalGreet() {
  // Bible: opener is short, soft, magic-friend, doesn't lead with "I'm AI"
  // Two beats: "heeeey... you there?" pause, then "I'm Nova! What's your name?"
  await novaSay("Heeeey... you there?");
  // Small pause before second line so it feels like two thoughts, not a dump
  setTimeout(() => {
    novaSay("I'm Nova. What's your name?");
    // Always show the dance button so kid/parent can skip if needed
    document.getElementById('rec-dance-btn').classList.add('ready');
  }, 1700);
}

window._sendChat = async function() {
  const inp = document.getElementById('rec-input');
  const text = inp.value.trim();
  if(!text) return;
  inp.value = '';
  handleKidInput(text);
};

// ─── INTRO state — tracks branching across multiple kid turns ──────
const introState = {
  turns: 0,
  bridgedToDance: false,
  followedUp: false   // we only do ONE connection follow-up before bridging
};

async function handleKidInput(text) {
  // Game-phase chat path: not used in intro/end during dance.
  if(memory.phase === 'game') {
    addBubble(text, 'kid');
    const reply = await brainThink(`Kid said mid-dance: "${text}". 1 short sentence reply, max 12 words.`, { maxTokens: 30 });
    if(reply) await novaSay(reply);
    return;
  }
  
  // INTRO BRANCHING — bible Mode A then Mode B
  if(memory.phase === 'recognition') {
    addBubble(text, 'kid');
    introState.turns++;
    
    const intent = await classifyIntent(text);
    console.log('[classify]', intent);
    
    // Update memory from classifier
    if(intent.name_given && !memory.kid.name) {
      memory.kid.name = intent.name_given.charAt(0).toUpperCase() + intent.name_given.slice(1);
    }
    if(intent.mood && !memory.kid.mood_at_intro) {
      memory.kid.mood_at_intro = intent.mood;
    }
    if(intent.topic) {
      memory.kid.things_they_said.push({ turn: introState.turns, topic: intent.topic, text });
    }
    syncMemoryAliases();
    
    // Route by intent
    let bridge = false;
    let promptForNova = '';
    
    if(intent.intent === 'dance' || intent.ready_to_dance) {
      // Direct path to dance
      promptForNova = memory.kid.name
        ? `The kid (${memory.kid.name}) is ready to dance. Say a warm 1-sentence "let's go" with their name. Max 10 words.`
        : `The kid is ready to dance. Say a warm 1-sentence "let's go". Max 10 words.`;
      bridge = true;
    }
    else if(intent.intent === 'shy') {
      promptForNova = memory.kid.name
        ? `${memory.kid.name} sounds shy or quiet. Be soft and gentle. Invite them to dance, no pressure. 1 short sentence.`
        : `The kid sounds shy or quiet. Be soft and gentle. Tell them you'll just call them friend. Invite them to dance, no pressure. 2 short sentences max.`;
      bridge = true; // shy kids get bridged so we don't loop on silence
    }
    else if(intent.intent === 'connection' && !introState.followedUp) {
      // ONE warm follow-up, no bridge yet — let the kid feel heard
      promptForNova = `The kid just shared: "${text}". Topic: ${intent.topic || 'unknown'}. Mood: ${intent.mood}. Respond like a curious magic friend — 1 short follow-up question OR a warm specific reaction. Max 12 words. Don't mention dancing yet.`;
      introState.followedUp = true;
    }
    else if(intent.intent === 'connection' && introState.followedUp) {
      // Already followed up once — gentle bridge to dance
      promptForNova = memory.kid.name
        ? `${memory.kid.name} is still chatting. Acknowledge warmly in 5 words then say "should we dance?" Max 12 words total.`
        : `Kid is still chatting. Acknowledge warmly in 5 words then say "should we dance?" Max 12 words total.`;
      bridge = true;
    }
    else if(intent.intent === 'question') {
      promptForNova = `The kid asked: "${text}". Answer simply, like a magic friend, max 1 short sentence. If they ask if you're real or AI, be honest in a kid-friendly way: you're an AI but your caring is real. Max 15 words. Then invite them to dance.`;
      bridge = true;
    }
    else { // off_topic
      promptForNova = `The kid said something off-topic: "${text}". Acknowledge warmly in 4 words then bridge to dancing. Max 10 words total.`;
      bridge = true;
    }
    
    // After 4 turns, force bridge so we never loop forever
    if(introState.turns >= 4 && !bridge) {
      promptForNova = `Final intro turn. Warmly invite the kid to dance now. Use their name if known: ${memory.kid.name || '(unknown)'}. Max 10 words.`;
      bridge = true;
    }
    
    const reply = await brainThink(promptForNova, { maxTokens: 60 });
    const fallback = memory.kid.name ? `Hi ${memory.kid.name}! Ready to dance?` : 'Yay! Ready to dance?';
    await novaSay(reply || fallback);
    
    if(bridge) {
      introState.bridgedToDance = true;
      // Show dance button prominently — kid or parent can tap to start
      document.getElementById('rec-dance-btn').classList.add('ready');
    }
    return;
  }
  
  // END phase — bible end flow
  if(memory.phase === 'end') {
    addBubble(text, 'kid');
    const intent = await classifyIntent(text);
    const last = memory.session.moments.slice(-2).join('; ') || 'a fun dance';
    const promptForNova = `Session just ended. Kid (${memory.kid.name || 'friend'}) said: "${text}". Mood: ${intent.mood}. They danced and we have these moments: ${last}. Respond warmly to what they said, max 1 sentence, then say goodbye like "see you later" referencing something specific. Max 2 sentences total.`;
    const reply = await brainThink(promptForNova, { maxTokens: 80 });
    if(reply) await novaSay(reply);
    window._endGoodbyeSpoken = true; // we just delivered the wrap-up
    return;
  }
  
  // Fallback
  addBubble(text, 'kid');
  const reply = await brainThink(text, { maxTokens: 80 });
  await novaSay(reply || 'Yay!');
}

let detector = null;
const moves = { left:false, right:false, both:false, clap:false, head:false, freeze:false };
const holdCount = { left:0, right:0, both:0, clap:0, head:0 };
const smooth = {};
let freezeBuffer = null;

async function initDetector() {
  console.log('initDetector: starting');
  if(typeof tf === 'undefined') {
    console.error('initDetector: tf is undefined — TF.js script did not load');
    return;
  }
  if(typeof poseDetection === 'undefined') {
    console.error('initDetector: poseDetection is undefined — pose-detection script did not load');
    return;
  }
  console.log('initDetector: tf version', tf.version?.tfjs);
  await tf.setBackend('webgl');
  await tf.ready();
  console.log('initDetector: TF ready, backend =', tf.getBackend());
  detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING }
  );
  console.log('initDetector: ✅ MoveNet ready');
}

function smoothKp(key, kp) {
  if(!smooth[key]) smooth[key] = { x:kp.x, y:kp.y, score:kp.score };
  const a = 0.7;
  smooth[key].x = smooth[key].x*a + kp.x*(1-a);
  smooth[key].y = smooth[key].y*a + kp.y*(1-a);
  smooth[key].score = kp.score;
  return smooth[key];
}

let _poseLogCount = 0;
let _poseLogLast = 0;
async function poseLoop() {
  const v = document.getElementById('webcam');
  if(!detector || !v || v.readyState < 2) {
    requestAnimationFrame(poseLoop);
    return;
  }
  try {
    const poses = await detector.estimatePoses(v, { flipHorizontal: false });
    if(poses.length > 0) {
      analyzePose(poses[0].keypoints);
      _poseLogCount++;
      // Log heartbeat every ~3 seconds so we can see detection is live
      const now = Date.now();
      if(now - _poseLogLast > 3000) {
        const visibleJoints = poses[0].keypoints.filter(k => k.score > 0.3).length;
        console.log(`pose detection alive: ${_poseLogCount} frames, ${visibleJoints}/17 joints visible`);
        _poseLogLast = now;
      }
    }
  } catch(e){
    console.log('poseLoop error:', e.message);
  }
  requestAnimationFrame(poseLoop);
}

function analyzePose(kps) {
  const g = n => kps.find(k => k.name === n);
  const ls=g('left_shoulder'), rs=g('right_shoulder');
  const lw=g('left_wrist'), rw=g('right_wrist');
  const nose=g('nose');
  if(!ls || !rs || !lw || !rw) return;
  
  const sLs = smoothKp('ls', ls), sRs = smoothKp('rs', rs);
  const sLw = smoothKp('lw', lw), sRw = smoothKp('rw', rw);
  const sNose = nose ? smoothKp('nose', nose) : null;
  
  const MIN = 0.3;
  const scale = Math.max(Math.abs(sLs.x - sRs.x), 60);
  const thr = scale * 0.24;
  
  // Arm raises
  const lUp = sLw.score > MIN && (sLs.y - sLw.y) > thr;
  const rUp = sRw.score > MIN && (sRs.y - sRw.y) > thr;
  
  const hold = (raw, key) => {
    holdCount[key] = raw ? Math.min(holdCount[key]+1, 10) : Math.max(holdCount[key]-1, 0);
    return holdCount[key] >= CFG.DETECTION_HOLD_FRAMES;
  };
  
  moves.left = hold(lUp && !rUp, 'left');
  moves.right = hold(rUp && !lUp, 'right');
  moves.both = lUp && rUp;
  
  // Clap — wrists meet near chest
  const wristY = (sLw.y + sRw.y) / 2;
  const shoulderY = (sLs.y + sRs.y) / 2;
  const wristGap = Math.abs(sLw.x - sRw.x);
  const isClap = sLw.score > MIN && sRw.score > MIN &&
    wristGap < scale * 0.55 &&
    wristY > shoulderY - scale * 0.3 &&
    wristY < shoulderY + scale * 1.0;
  moves.clap = hold(isClap, 'clap');
  
  // Hands on head
  const isHead = sNose && sLw.score > MIN && sRw.score > MIN &&
    sLw.y < sLs.y && sRw.y < sRs.y &&
    Math.abs(sLw.x - sNose.x) < scale * 0.9 &&
    Math.abs(sRw.x - sNose.x) < scale * 0.9;
  moves.head = hold(isHead, 'head');
  
  // Freeze — low movement variance
  if(!freezeBuffer) freezeBuffer = { lwx:[], lwy:[], rwx:[], rwy:[] };
  freezeBuffer.lwx.push(sLw.x); freezeBuffer.lwy.push(sLw.y);
  freezeBuffer.rwx.push(sRw.x); freezeBuffer.rwy.push(sRw.y);
  if(freezeBuffer.lwx.length > 18) {
    freezeBuffer.lwx.shift(); freezeBuffer.lwy.shift();
    freezeBuffer.rwx.shift(); freezeBuffer.rwy.shift();
  }
  if(freezeBuffer.lwx.length >= 12) {
    const variance = arr => {
      const m = arr.reduce((a,b)=>a+b,0) / arr.length;
      return arr.reduce((s,v)=>s+(v-m)**2,0) / arr.length;
    };
    const totalVar = variance(freezeBuffer.lwx) + variance(freezeBuffer.lwy) +
      variance(freezeBuffer.rwx) + variance(freezeBuffer.rwy);
    moves.freeze = totalVar < scale * scale * 0.012;
  } else {
    moves.freeze = false;
  }
  
  // Update pills
  ['left','right','both','clap','head','freeze'].forEach(k => {
    const el = document.getElementById('p-' + k);
    if(el) el.classList.toggle('on', moves[k]);
  });
}

function checkAction(action) {
  return moves[action] || false;
}

// Pre-cached emotional fillers — play instantly, no LLM wait
const QUICK_REACTIONS = {
  hit_fast: ['Yes!', 'Boom!', 'Whoa!', 'Pop!', 'Yeah!'],
  hit_normal: ['Yes!', 'Got it!', 'There!', 'Yay!', 'Nice!'],
  miss: ['Almost!', 'So close!', 'Oop!', 'Nearly!'],
};

function playQuickReaction(type) {
  const arr = QUICK_REACTIONS[type] || QUICK_REACTIONS.hit_normal;
  const phrase = arr[Math.floor(Math.random()*arr.length)];
  speak(phrase);
}

async function smartReact(action, isHit, isFast) {
  const now = Date.now();
  if(now - lastReactionTime < 2000) return; // 2s cooldown — give silence room to breathe
  
  // Only react ~35% of hits so Nova isn't constantly talking.
  // ALWAYS react on misses (gentle correction is the magic).
  if(isHit && Math.random() > 0.35) return;
  
  lastReactionTime = now;
  
  const useName = memory.name && Math.random() < 0.4;
  const nameInstr = useName ? `Use the name "${memory.name}" naturally. ` : '';
  
  let prompt;
  if(isHit && isFast) {
    prompt = `${nameInstr}Kid NAILED ${action} super fast! Tiny burst of joy. 2-4 words MAX.`;
  } else if(isHit) {
    prompt = `${nameInstr}Kid did ${action} right! Tiny celebration. 2-4 words MAX.`;
  } else {
    prompt = `${nameInstr}Kid missed ${action}. Tiny warm encouragement, never negative. 3-5 words MAX.`;
  }
  
  const reply = await brainThink(prompt, { maxTokens: 20 });
  if(reply) {
    showReactionBubble(reply, false);
    speak(reply);
  }
}

function startGame() {
  memory.phase = 'song';
  showPhase('phase-game');
  // Show D-ID face frame at top-center between panels (in-game position)
  document.getElementById('nova-face-frame').classList.add('in-game');
  score = 0; hits = 0; attempts = 0; combo = 0; maxCombo = 0; timelineIdx = 0;
  document.getElementById('game-score').textContent = '0';
  document.getElementById('game-progress').style.width = '0%';
  freezeBuffer = null;
  
  const vid = document.getElementById('nova-video');
  vid.currentTime = 0;
  vid.loop = true;
  vid.muted = false; // ensure not accidentally muted
  vid.onerror = () => console.error('nova-dance.mp4 error:', vid.error);
  vid.play().catch(err => console.error('nova-dance.mp4 play failed:', err));
  
  // Play shit.mp3 (renamed by user — same Hello-Hello song, 111s)
  const SONG_FILE = 'shit.mp3';
  const SONG_URL = encodeURI(SONG_FILE);
  const audio = new Audio(SONG_URL);
  audio.volume = 0.85;
  audio.onerror = () => {
    const codes = {
      1: 'MEDIA_ERR_ABORTED (user/browser cancelled)',
      2: 'MEDIA_ERR_NETWORK (download failed)',
      3: 'MEDIA_ERR_DECODE (file corrupt)',
      4: 'MEDIA_ERR_SRC_NOT_SUPPORTED (file missing or wrong format)',
    };
    const code = audio.error?.code;
    console.error(SONG_FILE+' ERROR:', codes[code] || 'unknown', '— src:', audio.currentSrc, '— msg:', audio.error?.message);
  };
  // Probe if the file is even reachable BEFORE we play it
  fetch(SONG_URL, { method: 'HEAD' })
    .then(r => console.log(SONG_FILE+' HEAD:', r.status, r.headers.get('content-type'), 'bytes:', r.headers.get('content-length')))
    .catch(e => console.error(SONG_FILE+' HEAD fetch failed:', e.message));
  window._audio = audio;
  audio.play().then(() => {
    console.log(SONG_FILE+' playing OK');
  }).catch(err => {
    console.error(SONG_FILE+' play() rejected:', err.name, err.message);
    setTimeout(() => audio.play().catch(e => console.error(SONG_FILE+' retry failed:', e.name, e.message)), 200);
  });
  audio.onended = () => setTimeout(endGame, 1200);
  
  // No "initial hype" speech — the song's own intro ("hello hello, are you ready,
  // let's move 1,2,3") IS the intro. Nova talking over it is just noise.
  
  songTimer = setInterval(gameTick, 80);
}

function gameTick() {
  const elapsed = (window._audio?.currentTime || 0) * 1000;
  const pct = Math.min(100, (elapsed / CFG.SONG_DURATION) * 100);
  document.getElementById('game-progress').style.width = pct + '%';
  
  // Auto-end if audio finishes or runs over
  if(elapsed >= CFG.SONG_DURATION + 500 && !window._audio?.paused) {
    // Wait for audio.onended to fire
  }
  
  while(timelineIdx < TIMELINE.length && elapsed >= TIMELINE[timelineIdx].t) {
    const e = TIMELINE[timelineIdx];
    
    if(e.type === 'beat') {
      // Energy level shifts based on phase
      if(e.name === 'easy-wins') setEnergyLevel('warm');
      else if(e.name === 'challenge') setEnergyLevel('high');
      else if(e.name === 'flow') setEnergyLevel('max');
      else if(e.name === 'freeze') setEnergyLevel('high');
      else if(e.name === 'celebration') setEnergyLevel('max');
    }
    else if(e.type === 'lyric') {
      // Skip on-screen lyrics — kids 3-5 can't read fast
      // Voice carries the lyric
    }
    else if(e.type === 'demo') {
      showCue(e.emoji, e.label, e.instr, false, 0);
    }
    else if(e.type === 'open') {
      currentAction = e;
      actionDetected = false;
      actionWindow = true;
      actionStartTime = Date.now();
      attempts++;
      memory.attempts++;
      
      let windowMs = 2500;
      for(let j = timelineIdx + 1; j < TIMELINE.length; j++) {
        if(TIMELINE[j].type === 'close' && TIMELINE[j].action === e.action) {
          windowMs = TIMELINE[j].t - e.t;
          break;
        }
      }
      
      setGreenFlash(true);
      showCue(e.emoji, e.label, e.instr, true, windowMs);
      
      let elapsedCheck = 0;
      const checker = setInterval(() => {
        elapsedCheck += 80;
        if(!actionWindow || actionDetected || elapsedCheck > windowMs + 200) {
          clearInterval(checker);
          return;
        }
        if(checkAction(e.action)) {
          actionDetected = true;
          clearInterval(checker);
          handleHit(e);
        }
      }, 80);
    }
    else if(e.type === 'close') {
      setGreenFlash(false);
      hideCue();
      if(!actionDetected && actionWindow) {
        handleMiss(currentAction);
      }
      actionWindow = false;
    }
    
    timelineIdx++;
  }
}

function handleHit(actionEvent) {
  const reactionMs = Date.now() - actionStartTime;
  const isFast = reactionMs < 1000;
  const pts = isFast ? Math.round(actionEvent.pts * 1.5) : actionEvent.pts;
  
  score += pts;
  hits++;
  combo++;
  maxCombo = Math.max(maxCombo, combo);
  memory.hits++;
  memory.streak++;
  memory.lastAction = actionEvent.action;
  // bible-shape mirror
  memory.session.hits++;
  memory.session.streak = memory.streak;
  memory.session.max_streak = Math.max(memory.session.max_streak, memory.streak);
  memory.session.cues_completed.push(actionEvent.action);
  
  if(memory.streak >= 2) addMoment(`${memory.streak}-move streak`);
  if(isFast) addMoment(`lightning fast ${actionEvent.action}`);
  
  updateStreak(combo);
  document.getElementById('game-score').textContent = score;
  showScorePop(pts, isFast ? '#ffd700' : '#00ff99');
  spawnConfetti();
  
  // Special huge celebration on FREEZE
  if(actionEvent.action === 'freeze') {
    novaFaceFrame.classList.add('celebrating');
    setTimeout(() => novaFaceFrame.classList.remove('celebrating'), 3500);
    addMoment('the FREEZE moment');
    brainThink('THE KID FROZE PERFECTLY! Express maximum emotional explosion! Reference the freeze. 6-8 words. Be over the top!', { maxTokens: 40 })
      .then(r => {
        const text = r || (memory.name ? `${memory.name}!! That freeze was PERFECT!` : 'PERFECT FREEZE!! WOW!');
        showReactionBubble(text, true);
        speak(text);
      });
  } else {
    smartReact(actionEvent.action, true, isFast);
  }
}

function handleMiss(actionEvent) {
  combo = 0;
  memory.streak = 0;
  memory.lastAction = actionEvent?.action;
  // bible-shape mirror
  memory.session.misses++;
  memory.session.streak = 0;
  if(actionEvent?.action) memory.session.cues_missed.push(actionEvent.action);
  updateStreak(0);
  flashMiss();
  smartReact(actionEvent?.action || 'move', false, false);
}

function endGame() {
  clearInterval(songTimer);
  setGreenFlash(false);
  hideCue();
  // Hide top-center D-ID face when game ends
  document.getElementById('nova-face-frame').classList.remove('in-game');
  if(window._audio) try { window._audio.pause(); } catch(e){}
  document.getElementById('nova-video').pause();
  
  memory.phase = 'end';
  setEnergyLevel('warm');
  
  const rate = attempts > 0 ? hits / attempts : 0;
  const stars = rate >= 0.9 ? 5 : rate >= 0.7 ? 4 : rate >= 0.5 ? 3 : rate >= 0.3 ? 2 : 1;
  
  showPhase('phase-end');
  
  document.getElementById('end-title').textContent = 
    ['So proud of you!','Good effort!','Great work!','Amazing dancer!','PERFECT! 🔥'][stars-1];
  
  // Animate stars in
  const starEl = document.getElementById('end-stars');
  starEl.textContent = '';
  let s = 0;
  const starIv = setInterval(() => {
    if(s < stars) { starEl.textContent += '⭐'; s++; }
    else if(s < 5) { starEl.textContent += '☆'; s++; }
    else clearInterval(starIv);
  }, 250);
  
  document.getElementById('end-pts').textContent = score + ' pts';
  document.getElementById('end-detail').textContent = 
    `${hits} of ${attempts} moves · best streak: ${maxCombo}`;
  
  // ─── Bible end flow ─────────────────────────────────
  // 1) Specific moment callback (warm, names a real thing they did)
  // 2) ONE small connection question (mic stays open for the answer)
  // 3) When kid answers, classify + warm response + goodbye
  // 4) Auto-goodbye after timeout if kid doesn't speak
  
  const bestMoment = memory.session.moments.slice(-1)[0] || 'that whole dance';
  const namePart = memory.kid.name ? memory.kid.name + '! ' : '';
  
  // First Nova line: specific praise + connection question
  const endPrompt = `Dance just ended. Kid name: ${memory.kid.name || 'unknown'}. Hits: ${hits}/${attempts}. Best streak: ${maxCombo}. Recent moments: ${memory.session.moments.slice(-3).join('; ') || 'none'}. 
  
Write a warm 2-sentence end. Sentence 1: Use their name (if known) and reference ONE specific thing they did from the moments. Sentence 2: Ask a small curious question — like "what was your favorite move?" or "did that feel good?" Don't say goodbye yet — we'll do that after they answer. Max 25 words total.`;
  
  brainThink(endPrompt, { maxTokens: 90 }).then(r => {
    const fallback = `${namePart}You did it! What was your favorite part?`;
    const msg = r || fallback;
    document.getElementById('end-msg').textContent = msg;
    speak(msg);
    // Mic is already always-on; handleKidInput in 'end' phase will catch their reply
    // If they don't say anything in 12s, deliver the goodbye automatically
    setTimeout(() => {
      if(memory.phase === 'end' && !window._endGoodbyeSpoken) {
        window._endGoodbyeSpoken = true;
        const goodbyeFallback = memory.kid.name 
          ? `Bye ${memory.kid.name}! See you next time.`
          : 'Bye friend! See you next time.';
        const goodbyePrompt = `Quick warm goodbye. Reference: ${memory.session.moments.slice(-1)[0] || 'their dance'}. Use name if known: ${memory.kid.name || 'unknown'}. Max 8 words.`;
        brainThink(goodbyePrompt, { maxTokens: 30 }).then(g => {
          speak(g || goodbyeFallback);
        });
      }
    }, 12000);
  });
}

document.addEventListener('arrival-done', async () => {
  memory.phase = 'recognition';
  showPhase('phase-recognition');
  
  // Start the Kling intro overlay covering the D-ID circle until D-ID is ready
  startIntroOverlay();
  
  // Mic permission
  try { await navigator.mediaDevices.getUserMedia({ audio: true }); } catch(e){}
  
  // Camera
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' },
      audio: false,
    });
    document.getElementById('webcam').srcObject = stream;
    // v49g: kick off Mirror Light once the camera is producing frames.
    // This is async but non-blocking — we don't await it so app keeps loading.
    startMirrorLight();
  } catch(e) { console.log('cam:', e); }
  
  // Always-on mic — Nova listens continuously from now on
  startAlwaysOnMic();
  
  // If D-ID already connected, greet now and hand off intro
  if(didReady && !window._greeted) {
    window._greeted = true;
    handoffFromIntro();
    novaArrivalGreet();
  } else {
    // 12s safety: if D-ID still not connected, force handoff so app doesn't hang
    setTimeout(() => {
      if(!window._greeted) {
        window._greeted = true;
        handoffFromIntro();
        novaArrivalGreet();
      }
    }, 12000);
  }
});
