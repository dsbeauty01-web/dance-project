<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova v13 — Real Dance Animation Test</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(ellipse at 50% 40%,#4a1a8a 0%,#2a0a5a 50%,#0a0120 100%);color:#fff;font-family:'Nunito',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}

#topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);z-index:10}
#title{font-family:'Fredoka One',cursive;font-size:18px;background:linear-gradient(135deg,#ff6fd8,#7c6fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#status{font-size:12px;color:rgba(255,255,255,0.7)}

#canvas-wrap{flex:1;position:relative}
#avatar-canvas{width:100%;height:100%;display:block}

#controls{background:rgba(0,0,0,0.75);padding:14px;backdrop-filter:blur(8px);display:flex;flex-direction:column;gap:10px;z-index:10}
.row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
button{background:linear-gradient(135deg,#ff6fd8,#7c6fff);border:none;border-radius:24px;padding:10px 18px;color:#fff;font-size:13px;font-weight:700;font-family:'Fredoka One',cursive;cursor:pointer;transition:transform .15s}
button:hover{transform:scale(1.04)}
button:disabled{opacity:0.4;cursor:not-allowed}
button.dance{background:linear-gradient(135deg,#00d2ff,#7c6fff)}
button.stop{background:linear-gradient(135deg,#ff6680,#ff3355)}

#log{font-family:monospace;font-size:11px;color:rgba(255,255,255,0.55);max-height:80px;overflow-y:auto;background:rgba(0,0,0,0.4);border-radius:8px;padding:8px;line-height:1.5}

#loading{position:fixed;inset:0;background:#1a0533;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:100}
#loading h2{font-family:'Fredoka One',cursive;font-size:22px;color:#ff6fd8}
.spin{width:36px;height:36px;border:3px solid rgba(255,111,216,0.2);border-top-color:#ff6fd8;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#load-msg{font-size:13px;color:rgba(255,255,255,0.5);max-width:280px;text-align:center}
</style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <h2>Loading Nova 3D... 🌟</h2>
  <p id="load-msg">Starting Three.js v0.180...</p>
</div>

<div id="topbar">
  <div id="title">🌟 Nova v13 — Real Dance Animation</div>
  <div id="status">Loading...</div>
</div>

<div id="canvas-wrap">
  <canvas id="avatar-canvas"></canvas>
</div>

<div id="controls">
  <div class="row">
    <button class="dance" onclick="playAnim('idle')" id="btn-idle">🧍 Idle</button>
    <button class="dance" onclick="playAnim('wave')" id="btn-wave">👋 Wave</button>
    <button class="dance" onclick="playAnim('peace')" id="btn-peace">✌️ Peace</button>
    <button class="dance" onclick="playAnim('spin')" id="btn-spin">🌀 Spin</button>
    <button class="dance" onclick="playAnim('squat')" id="btn-squat">🏋️ Squat</button>
    <button class="dance" onclick="playAnim('shoot')" id="btn-shoot">🔫 Shoot</button>
    <button class="dance" onclick="playAnim('model')" id="btn-model">💃 Model Pose</button>
    <button class="stop" onclick="stopAll()">⏹ Stop</button>
  </div>
  <div id="log">Loading scripts...</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js",
    "@pixiv/three-vrm-animation": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-animation@3/lib/three-vrm-animation.module.min.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';
import { createVRMAnimationClip, VRMAnimationLoaderPlugin } from '@pixiv/three-vrm-animation';

const logEl = document.getElementById('log');
function log(msg){
  console.log(msg);
  const t = new Date().toLocaleTimeString().slice(3);
  logEl.innerHTML = `[${t}] ${msg}<br>` + logEl.innerHTML.split('<br>').slice(0,6).join('<br>');
}
function setStatus(s){ document.getElementById('status').textContent = s; }
function setLoadMsg(s){ const el = document.getElementById('load-msg'); if(el) el.textContent = s; }

// ── SCENE SETUP ──
const canvas = document.getElementById('avatar-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();

// Warm Pixar-style lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const key = new THREE.DirectionalLight(0xfff0e0, 1.3);
key.position.set(2, 4, 3);
scene.add(key);
const fill = new THREE.DirectionalLight(0xffc0e0, 0.5);
fill.position.set(-2, 2, 2);
scene.add(fill);
const rim = new THREE.DirectionalLight(0xa0a0ff, 0.8);
rim.position.set(0, 3, -4);
scene.add(rim);

const camera = new THREE.PerspectiveCamera(28, 1, 0.1, 100);
camera.position.set(0, 0.9, 3.2);
camera.lookAt(0, 0.9, 0);

function resize(){
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  if(w === 0 || h === 0) return;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  if(h > w){
    camera.position.z = 4.0;
    camera.position.y = 0.85;
  } else {
    camera.position.z = 3.0;
    camera.position.y = 0.9;
  }
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// ── LOAD VRM + VRMA ──
let vrm = null;
let mixer = null;
const clock = new THREE.Clock();

// VRM avatar URL
const VRM_URL = 'https://cdn.jsdelivr.net/gh/pixiv/three-vrm@release/packages/three-vrm/examples/models/VRM1_Constraint_Twist_Sample.vrm';

// VRMA animations — the free official Pixiv ones
// Format: "VRMA_01" through "VRMA_07" from VRoid
// Hosted via jsdelivr from the three-vrm-animation example repo
const VRMA_URLS = {
  idle:  'https://cdn.jsdelivr.net/gh/pixiv/three-vrm@release/packages/three-vrm-animation/examples/models/test.vrma',
  // For other animations, we'll use local proxies to the official VRoid shop downloads
  // Since those are hosted on Booth (auth required), we fall back to test.vrma for all
  // User can replace URLs with their own downloaded VRMAs
  wave:   'https://cdn.jsdelivr.net/gh/pixiv/three-vrm@release/packages/three-vrm-animation/examples/models/test.vrma',
  peace:  'https://cdn.jsdelivr.net/gh/pixiv/three-vrm@release/packages/three-vrm-animation/examples/models/test.vrma',
  spin:   'https://cdn.jsdelivr.net/gh/pixiv/three-vrm@release/packages/three-vrm-animation/examples/models/test.vrma',
  squat:  'https://cdn.jsdelivr.net/gh/pixiv/three-vrm@release/packages/three-vrm-animation/examples/models/test.vrma',
  shoot:  'https://cdn.jsdelivr.net/gh/pixiv/three-vrm@release/packages/three-vrm-animation/examples/models/test.vrma',
  model:  'https://cdn.jsdelivr.net/gh/pixiv/three-vrm@release/packages/three-vrm-animation/examples/models/test.vrma',
};

const loadedClips = {}; // name -> AnimationClip
let currentAction = null;

async function loadVRM(){
  setLoadMsg('Loading 3D avatar...');
  log('Fetching VRM...');

  const loader = new GLTFLoader();
  loader.crossOrigin = 'anonymous';
  loader.register(parser => new VRMLoaderPlugin(parser));
  loader.register(parser => new VRMAnimationLoaderPlugin(parser));

  const gltf = await loader.loadAsync(VRM_URL);
  vrm = gltf.userData.vrm;

  VRMUtils.removeUnnecessaryVertices(vrm.scene);
  VRMUtils.removeUnnecessaryJoints(vrm.scene);
  vrm.scene.traverse(obj => obj.frustumCulled = false);

  scene.add(vrm.scene);
  mixer = new THREE.AnimationMixer(vrm.scene);

  log('✅ VRM loaded');
}

async function loadAnimation(name){
  if(loadedClips[name]) return loadedClips[name];

  setLoadMsg(`Loading ${name} animation...`);
  log(`Fetching ${name}.vrma...`);

  const url = VRMA_URLS[name];
  if(!url){
    log(`❌ No URL for ${name}`);
    return null;
  }

  try {
    const loader = new GLTFLoader();
    loader.crossOrigin = 'anonymous';
    loader.register(parser => new VRMAnimationLoaderPlugin(parser));
    const gltf = await loader.loadAsync(url);
    const vrmAnim = gltf.userData.vrmAnimations[0];

    if(!vrmAnim){
      log(`❌ No VRM animation in ${name}.vrma`);
      return null;
    }

    const clip = createVRMAnimationClip(vrmAnim, vrm);
    loadedClips[name] = clip;
    log(`✅ ${name} animation ready`);
    return clip;
  } catch(e){
    log(`❌ Load ${name} failed: ${e.message}`);
    return null;
  }
}

window.playAnim = async function(name){
  if(!vrm || !mixer){
    log('Not ready yet');
    return;
  }
  setStatus(`Playing: ${name}`);
  const clip = await loadAnimation(name);
  if(!clip){ setStatus('Failed'); return; }

  // Fade out old, fade in new
  if(currentAction){
    currentAction.fadeOut(0.3);
  }
  currentAction = mixer.clipAction(clip);
  currentAction.reset();
  currentAction.fadeIn(0.3);
  currentAction.play();

  // Loop it
  currentAction.setLoop(THREE.LoopRepeat, Infinity);
};

window.stopAll = function(){
  if(currentAction){
    currentAction.fadeOut(0.4);
    setStatus('Stopped');
  }
};

function animate(){
  requestAnimationFrame(animate);
  const deltaTime = clock.getDelta();
  if(mixer) mixer.update(deltaTime);
  if(vrm) vrm.update(deltaTime);
  renderer.render(scene, camera);
}

// ── BOOT ──
(async function(){
  try {
    setLoadMsg('Loading three.js v0.180...');
    await loadVRM();

    // Pre-load idle animation and start playing
    await playAnim('idle');

    animate();
    document.getElementById('loading').style.display = 'none';
    setStatus('Ready — try the buttons!');
    log('✅ Everything ready. Nova is dancing!');
    log('ℹ️ All buttons use same test.vrma file for now');
    log('ℹ️ To add unique dances: upload .vrma to repo, edit VRMA_URLS');
  } catch(e){
    log(`FATAL: ${e.message}`);
    setLoadMsg(`❌ Failed: ${e.message}`);
    console.error(e);
  }
})();
</script>

</body>
</html>
