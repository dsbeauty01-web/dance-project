<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova v12 — 3D Avatar + Lipsync Prototype</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(ellipse at 50% 20%,#3a0a6a 0%,#1a0340 50%,#0a0120 100%);color:#fff;font-family:'Nunito',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}

#topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);z-index:10}
#title{font-family:'Fredoka One',cursive;font-size:18px;background:linear-gradient(135deg,#ff6fd8,#7c6fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#status{font-size:12px;color:rgba(255,255,255,0.6)}

#canvas-wrap{flex:1;position:relative;display:flex;align-items:center;justify-content:center}
#avatar-canvas{width:100%;height:100%;display:block}

#controls{background:rgba(0,0,0,0.7);padding:14px;backdrop-filter:blur(8px);display:flex;flex-direction:column;gap:10px;z-index:10}
.row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
button{background:linear-gradient(135deg,#ff6fd8,#7c6fff);border:none;border-radius:24px;padding:10px 18px;color:#fff;font-size:13px;font-weight:700;font-family:'Fredoka One',cursive;cursor:pointer;transition:transform .15s}
button:hover{transform:scale(1.04)}
button:disabled{opacity:0.4;cursor:not-allowed}
button.action{background:linear-gradient(135deg,#00d2ff,#7c6fff)}
button.speak{background:linear-gradient(135deg,#ffd700,#ff8a00)}

#log{font-family:monospace;font-size:11px;color:rgba(255,255,255,0.5);max-height:70px;overflow-y:auto;background:rgba(0,0,0,0.4);border-radius:8px;padding:8px;line-height:1.5}

#loading{position:fixed;inset:0;background:#1a0533;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:100}
#loading h2{font-family:'Fredoka One',cursive;font-size:22px;color:#ff6fd8}
.spin{width:36px;height:36px;border:3px solid rgba(255,111,216,0.2);border-top-color:#ff6fd8;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#load-msg{font-size:13px;color:rgba(255,255,255,0.5)}
</style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <h2>Loading Nova 3D... 🌟</h2>
  <p id="load-msg">Starting Three.js...</p>
</div>

<div id="topbar">
  <div id="title">🌟 Nova v12 — 3D Prototype</div>
  <div id="status">Ready</div>
</div>

<div id="canvas-wrap">
  <canvas id="avatar-canvas"></canvas>
</div>

<div id="controls">
  <div class="row">
    <button class="action" onclick="poseWave()">👋 Wave</button>
    <button class="action" onclick="poseBothUp()">🙌 Arms Up</button>
    <button class="action" onclick="poseClap()">👏 Clap</button>
    <button class="action" onclick="poseHead()">🙆 On Head</button>
    <button class="action" onclick="poseStar()">⭐ Star</button>
    <button class="action" onclick="poseIdle()">🧍 Idle</button>
  </div>
  <div class="row">
    <button class="speak" onclick="speakTest('Hello hello! Can you clap your hands?')">🎤 Speak (test lipsync)</button>
    <button onclick="toggleDance()" id="dance-btn">🎵 Start Dance Loop</button>
  </div>
  <div id="log">Initializing...</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.min.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

// ══════════════════════════════════════════
// LOGGING
// ══════════════════════════════════════════
const logEl = document.getElementById('log');
function log(msg){
  console.log(msg);
  const t = new Date().toLocaleTimeString().slice(3);
  logEl.innerHTML = `[${t}] ${msg}<br>` + logEl.innerHTML.split('<br>').slice(0,6).join('<br>');
}
function setStatus(s){ document.getElementById('status').textContent = s; }
function setLoadMsg(s){ const el = document.getElementById('load-msg'); if(el) el.textContent = s; }

// ══════════════════════════════════════════
// THREE.JS SCENE
// ══════════════════════════════════════════
const canvas = document.getElementById('avatar-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();

// Lighting — warm, Pixar-ish
const ambient = new THREE.AmbientLight(0xffffff, 0.7);
scene.add(ambient);
const keyLight = new THREE.DirectionalLight(0xfff0e0, 1.2);
keyLight.position.set(2, 4, 3);
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0xffc0e0, 0.5);
fillLight.position.set(-2, 2, 2);
scene.add(fillLight);
const rimLight = new THREE.DirectionalLight(0xa0a0ff, 0.8);
rimLight.position.set(0, 3, -4);
scene.add(rimLight);

const camera = new THREE.PerspectiveCamera(30, 1, 0.1, 100);
camera.position.set(0, 1.3, 2.8);
camera.lookAt(0, 1.2, 0);

function resize(){
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);

// ══════════════════════════════════════════
// LOAD VRM AVATAR
// ══════════════════════════════════════════
let vrm = null;
let mouthMorphs = {};  // viseme morph targets
let expressionManager = null;

// Public sample VRM from Pixiv's three-vrm demo — known to work, has blend shapes
const VRM_URL = 'https://cdn.jsdelivr.net/gh/pixiv/three-vrm@release/packages/three-vrm/examples/models/VRM1_Constraint_Twist_Sample.vrm';
// Backup (alternative avatar style):
// const VRM_URL = 'https://pixiv.github.io/three-vrm/packages/three-vrm/examples/models/three-vrm-girl-1.0.vrm';

async function loadVRM(){
  setLoadMsg('Loading 3D avatar...');
  log('Fetching VRM: ' + VRM_URL.split('/').pop());

  const loader = new GLTFLoader();
  loader.register((parser) => new VRMLoaderPlugin(parser));

  return new Promise((resolve, reject) => {
    loader.load(
      VRM_URL,
      (gltf) => {
        vrm = gltf.userData.vrm;
        VRMUtils.removeUnnecessaryVertices(gltf.scene);
        VRMUtils.removeUnnecessaryJoints(gltf.scene);
        vrm.scene.traverse((obj) => { obj.frustumCulled = false; });

        // Face the camera
        vrm.scene.rotation.y = Math.PI;
        scene.add(vrm.scene);

        // Get expression manager (handles visemes + expressions)
        expressionManager = vrm.expressionManager;
        if(expressionManager){
          log('✅ Expression manager found');
          // List available expressions
          const available = expressionManager.expressions.map(e => e.expressionName);
          log('Visemes/expressions: ' + available.slice(0,8).join(','));
        } else {
          log('⚠️ No expression manager — lipsync disabled');
        }

        log('✅ Avatar loaded!');
        resolve();
      },
      (progress) => {
        const pct = progress.total ? (progress.loaded / progress.total * 100).toFixed(0) : '?';
        setLoadMsg(`Loading avatar... ${pct}%`);
      },
      (error) => {
        log('❌ VRM load failed: ' + error.message);
        reject(error);
      }
    );
  });
}

// ══════════════════════════════════════════
// POSE / BODY ANIMATION (manual rig pose)
// Using VRM humanoid bones
// ══════════════════════════════════════════
function getBone(name){
  if(!vrm || !vrm.humanoid) return null;
  return vrm.humanoid.getNormalizedBoneNode(name);
}

const targetPose = {}; // target rotations for each bone

function setBoneTarget(name, x, y, z){
  targetPose[name] = new THREE.Euler(x, y, z);
}

function resetPose(){
  Object.keys(targetPose).forEach(k => delete targetPose[k]);
}

// Define poses using humanoid bone names
window.poseIdle = function(){
  resetPose();
  log('Pose: idle');
};

window.poseWave = function(){
  resetPose();
  // Right arm up (VRM "right" is the character's right)
  setBoneTarget('rightUpperArm', 0, 0, -2.0);
  setBoneTarget('rightLowerArm', 0, -0.5, 0);
  setBoneTarget('rightHand', 0, 0, 0.3);
  log('Pose: wave 👋');
};

window.poseBothUp = function(){
  resetPose();
  setBoneTarget('leftUpperArm', 0, 0, 2.3);
  setBoneTarget('rightUpperArm', 0, 0, -2.3);
  log('Pose: both arms up 🙌');
};

window.poseClap = function(){
  resetPose();
  setBoneTarget('leftUpperArm', 0, 0, 1.2);
  setBoneTarget('rightUpperArm', 0, 0, -1.2);
  setBoneTarget('leftLowerArm', 0, -1.5, 0);
  setBoneTarget('rightLowerArm', 0, 1.5, 0);
  log('Pose: clap 👏');
};

window.poseHead = function(){
  resetPose();
  setBoneTarget('leftUpperArm', 0, 0, 1.8);
  setBoneTarget('rightUpperArm', 0, 0, -1.8);
  setBoneTarget('leftLowerArm', 0, -2.0, 0);
  setBoneTarget('rightLowerArm', 0, 2.0, 0);
  log('Pose: hands on head 🙆');
};

window.poseStar = function(){
  resetPose();
  setBoneTarget('leftUpperArm', 0, 0, 1.57);
  setBoneTarget('rightUpperArm', 0, 0, -1.57);
  log('Pose: star ⭐');
};

// ══════════════════════════════════════════
// DANCE LOOP (idle beat bounce)
// ══════════════════════════════════════════
let dancing = false;
let danceTime = 0;
const DANCE_BPM = 80;
const DANCE_BEAT_PERIOD = 60 / DANCE_BPM;

window.toggleDance = function(){
  dancing = !dancing;
  document.getElementById('dance-btn').textContent = dancing ? '⏸️ Stop Dance' : '🎵 Start Dance Loop';
  log(dancing ? 'Dance started' : 'Dance stopped');
};

// ══════════════════════════════════════════
// LIPSYNC — browser speech + viseme mapping
// (In real app, replace with wawa-lipsync or audio analysis)
// ══════════════════════════════════════════
let currentViseme = 'aa';
let visemeTime = 0;
let visemeActive = false;

// VRM expression viseme names: aa, ih, ou, ee, oh
const VISEMES = ['aa','ih','ou','ee','oh'];

window.speakTest = async function(text){
  log('Speaking: "' + text + '"');
  setStatus('Speaking...');

  if(!window.speechSynthesis){
    log('❌ No speech synthesis');
    return;
  }

  // Start lipsync animation (random visemes while speaking — very basic)
  visemeActive = true;

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = 0.9;
  utterance.pitch = 1.2;

  utterance.onboundary = (e) => {
    // Word boundary — pick a new viseme
    currentViseme = VISEMES[Math.floor(Math.random() * VISEMES.length)];
  };

  utterance.onend = () => {
    visemeActive = false;
    currentViseme = 'aa';
    setStatus('Ready');
    log('Speech done');
  };

  speechSynthesis.speak(utterance);
};

// ══════════════════════════════════════════
// RENDER LOOP
// ══════════════════════════════════════════
const clock = new THREE.Clock();

function updateVRM(deltaTime){
  if(!vrm) return;

  // --- DANCE (idle bob when dancing) ---
  if(dancing){
    danceTime += deltaTime;
    const beatPhase = (danceTime / DANCE_BEAT_PERIOD) * Math.PI * 2;
    const beat = Math.sin(beatPhase);
    const halfBeat = Math.sin(beatPhase / 2);

    // Hips sway side to side
    const hips = getBone('hips');
    if(hips){
      hips.rotation.z = halfBeat * 0.08;
      hips.position.y = Math.abs(beat) * -0.03; // squat on beat
    }

    // Spine follows
    const spine = getBone('spine');
    if(spine){
      spine.rotation.z = -halfBeat * 0.04;
    }

    // Arms do a gentle sway if no pose is active
    if(Object.keys(targetPose).length === 0){
      setBoneTarget('leftUpperArm', 0, 0, 0.3 + beat * 0.4);
      setBoneTarget('rightUpperArm', 0, 0, -0.3 - beat * 0.4);
    }
  }

  // --- APPLY POSES (smooth lerp toward target) ---
  const boneNames = ['leftUpperArm','rightUpperArm','leftLowerArm','rightLowerArm','leftHand','rightHand','spine','chest','neck','head'];
  boneNames.forEach(name => {
    const bone = getBone(name);
    if(!bone) return;
    const target = targetPose[name];
    if(target){
      bone.rotation.x += (target.x - bone.rotation.x) * 0.15;
      bone.rotation.y += (target.y - bone.rotation.y) * 0.15;
      bone.rotation.z += (target.z - bone.rotation.z) * 0.15;
    } else {
      // Lerp back to zero
      bone.rotation.x += (0 - bone.rotation.x) * 0.08;
      bone.rotation.y += (0 - bone.rotation.y) * 0.08;
      bone.rotation.z += (0 - bone.rotation.z) * 0.08;
    }
  });

  // --- LIPSYNC (viseme expressions) ---
  if(expressionManager){
    // Reset all visemes first
    VISEMES.forEach(v => {
      if(expressionManager.getExpression(v)){
        expressionManager.setValue(v, 0);
      }
    });

    if(visemeActive){
      visemeTime += deltaTime;
      // Oscillate the active viseme for talking motion
      const amp = Math.abs(Math.sin(visemeTime * 14));
      if(expressionManager.getExpression(currentViseme)){
        expressionManager.setValue(currentViseme, amp * 0.8);
      }
    }
  }

  // --- BLINK (random) ---
  if(expressionManager && Math.random() < 0.003 && !window._blinking){
    window._blinking = true;
    const blinkStart = Date.now();
    const blink = () => {
      const elapsed = Date.now() - blinkStart;
      if(elapsed > 180){
        expressionManager.setValue('blink', 0);
        window._blinking = false;
        return;
      }
      const v = elapsed < 80 ? elapsed/80 : Math.max(0, 1 - (elapsed-80)/100);
      if(expressionManager.getExpression('blink')){
        expressionManager.setValue('blink', v);
      }
      requestAnimationFrame(blink);
    };
    blink();
  }

  vrm.update(deltaTime);
}

function animate(){
  requestAnimationFrame(animate);
  const deltaTime = clock.getDelta();
  updateVRM(deltaTime);
  renderer.render(scene, camera);
}

// ══════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════
(async function(){
  try {
    resize();
    setLoadMsg('Three.js ready');
    await loadVRM();
    resize();
    animate();
    document.getElementById('loading').style.display = 'none';
    setStatus('Avatar ready! Try the buttons 👇');
    log('✅ Everything ready');
  } catch(e){
    setLoadMsg('❌ Failed: ' + e.message);
    log('FATAL: ' + e.message);
  }
})();
</script>

</body>
</html>
