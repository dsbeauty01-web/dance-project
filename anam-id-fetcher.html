<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anam ID Fetcher</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0824;
  color: #fff;
  padding: 20px;
  min-height: 100vh;
}
h1 {
  background: linear-gradient(135deg, #10b981, #34d399);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-size: 28px;
  margin-bottom: 4px;
}
.sub { color: #94a3b8; margin-bottom: 24px; font-size: 14px; }

.section {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 16px;
}
.section h2 {
  color: #34d399;
  font-size: 18px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section h2 .count {
  background: rgba(52,211,153,0.2);
  color: #34d399;
  padding: 2px 10px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 500;
}
.item {
  background: rgba(255,255,255,0.04);
  padding: 10px 14px;
  border-radius: 8px;
  margin-bottom: 8px;
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.item-info { flex: 1; min-width: 0; }
.item-name {
  color: #fff;
  font-weight: 600;
  margin-bottom: 4px;
  font-family: -apple-system, sans-serif;
  font-size: 14px;
}
.item-id {
  color: #94a3b8;
  word-break: break-all;
  user-select: all;
}
.copy-btn {
  background: rgba(52,211,153,0.2);
  color: #34d399;
  border: 1px solid rgba(52,211,153,0.3);
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  flex-shrink: 0;
  transition: all 0.15s;
}
.copy-btn:hover { background: rgba(52,211,153,0.3); }
.copy-btn.copied { background: #10b981; color: #fff; }

.error {
  background: rgba(239,68,68,0.15);
  border: 1px solid rgba(239,68,68,0.3);
  color: #fca5a5;
  padding: 12px 16px;
  border-radius: 8px;
  margin-bottom: 12px;
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 13px;
  white-space: pre-wrap;
}

.loading { color: #94a3b8; font-size: 14px; padding: 8px; }

#api-key-input {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  padding: 12px 14px;
  border-radius: 8px;
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 12px;
  margin-bottom: 12px;
}

#fetch-btn {
  background: linear-gradient(135deg, #10b981, #059669);
  color: #fff;
  border: none;
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 24px;
  transition: transform 0.1s;
}
#fetch-btn:hover { transform: translateY(-1px); }
#fetch-btn:disabled { opacity: 0.5; cursor: wait; }

.highlight {
  background: rgba(245,158,11,0.15);
  border: 1px solid rgba(245,158,11,0.3);
  border-radius: 6px;
  padding: 8px 12px;
  margin-top: 8px;
  font-size: 12px;
  color: #fcd34d;
}
</style>
</head>
<body>
  <h1>🟢 Anam ID Fetcher</h1>
  <p class="sub">Lists all personas, avatars, voices and LLMs in your Anam account. Copy any ID with one click.</p>

  <input id="api-key-input" type="text" placeholder="Anam API key (already filled — just click Fetch)" 
         value="YjZkNjdkYzgtZjliOS00YWIxLTgwZWEtNmM0MTM2MDVmY2I3Oi96WDhMQ05vRDRITFNvNEl3aDZMREgzd0V2eUNVZWxkVDhOaHVpSGt3SFE9">
  <button id="fetch-btn" onclick="fetchAll()">Fetch all IDs →</button>

  <div id="results"></div>

<script>
const API = 'https://api.anam.ai/v1';

async function fetchEndpoint(path, key) {
  const res = await fetch(API + path, {
    headers: { 'Authorization': 'Bearer ' + key }
  });
  if(!res.ok) {
    const text = await res.text();
    throw new Error(res.status + ' ' + res.statusText + ' — ' + text);
  }
  return res.json();
}

function makeSection(title, items, fields) {
  if(!items || items.length === 0) {
    return `<div class="section"><h2>${title} <span class="count">0</span></h2><p class="loading">No items found.</p></div>`;
  }
  const itemsHTML = items.map(it => {
    const name = it[fields.name] || it.name || it.label || '(unnamed)';
    const id = it[fields.id] || it.id;
    const extra = fields.extra ? `<div class="item-id" style="margin-top:4px;font-size:11px">${fields.extra(it)}</div>` : '';
    return `<div class="item">
      <div class="item-info">
        <div class="item-name">${escapeHTML(name)}</div>
        <div class="item-id">${id}</div>
        ${extra}
      </div>
      <button class="copy-btn" onclick="copyToClip(this, '${id}')">Copy</button>
    </div>`;
  }).join('');
  return `<div class="section">
    <h2>${title} <span class="count">${items.length}</span></h2>
    ${itemsHTML}
  </div>`;
}

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function copyToClip(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 1500);
  });
}

async function fetchAll() {
  const key = document.getElementById('api-key-input').value.trim();
  if(!key) { alert('Paste API key first'); return; }
  
  const btn = document.getElementById('fetch-btn');
  const results = document.getElementById('results');
  btn.disabled = true;
  btn.textContent = 'Fetching...';
  results.innerHTML = '<p class="loading">Calling Anam API...</p>';
  
  let html = '';
  
  // Helper to wrap each call so one failure doesn't kill all
  async function trySection(title, path, fields) {
    try {
      const data = await fetchEndpoint(path, key);
      // Anam API returns { data: [...], meta: {...} }
      const items = data.data || data.items || (Array.isArray(data) ? data : []);
      return makeSection(title, items, fields);
    } catch(e) {
      return `<div class="section"><h2>${title}</h2>
        <div class="error">❌ Failed: ${escapeHTML(e.message)}</div></div>`;
    }
  }
  
  html += await trySection('🎭 Personas (your configured agents like Liv)', '/personas', {
    id: 'id',
    name: 'name',
    extra: it => `prompt: ${escapeHTML((it.systemPrompt || '').slice(0, 100))}...`
  });
  
  html += await trySection('👤 Avatars (visual characters)', '/avatars', {
    id: 'id', name: 'name'
  });
  
  html += await trySection('🎤 Voices', '/voices', {
    id: 'id', name: 'name'
  });
  
  html += await trySection('🧠 LLMs', '/llms', {
    id: 'id', name: 'name'
  });
  
  results.innerHTML = html;
  btn.disabled = false;
  btn.textContent = 'Re-fetch';
  
  // Scroll personas into view (where Liv is)
  results.querySelector('.section')?.scrollIntoView({ behavior: 'smooth' });
}

// Auto-fetch on load if key is pre-filled
window.addEventListener('DOMContentLoaded', () => {
  if(document.getElementById('api-key-input').value.length > 50) {
    fetchAll();
  }
});
</script>
</body>
</html>
